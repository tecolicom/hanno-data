description: |-
  🆕 新着掲載 (公開日: 2026-06-12)
  
  ## 6月12日の気象情報について
  
  埼玉県では、12日昼過ぎから夜遅くにかけて、雷を伴った激しい雨の降る予報となっております。
  
  低い土地の浸水、河川の増水に注意・警戒し、落雷や竜巻などの激しい突風、土砂災害に注意してください。
  
  降ひょうのおそれもありますので、農作物や農業施設の管理にも注意してください。
  
  降ひょうによる被害については、防災危機管理課にご相談ください。
  
