    summary: "📝 Mayor: 2026 Spring Saitama Prefectural High School Baseball Tournament Matchups"
    description: |-
      Automated translation (refer to source for accuracy)

      On Monday, April 20, 2026 (Reiwa 8), the matchups for the Spring Saitama Prefectural High School Baseball Tournament were announced.

      Seibu Gakuen High School will face Omiya Kita High School on Friday, April 24 at UD Trucks Utsunomiya Stadium. Hanno High School, which advanced through the district preliminaries for the first time in 10 years, will face Urawa Gakuin on Saturday, April 25 at Omiya Park Baseball Stadium.

      We look forward to the support of all our residents.

      Source (Japanese): https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13465.html
