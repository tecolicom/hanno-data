description: |-
  🔄 内容更新 (公開日: 2026-03-19)
  
  ## こども誰でも通園制度とは
  
  こども誰でも通園制度は、全てのこどもの育ちを応援し、こどもの良質な成育環境を整備するとともに、全ての子育て家庭に対して、多様な働き方やライフスタイルにかかわらない形での支援を強化するため、保育所等に通っていない0歳6か月以上3歳未満のこどもを対象に、月10時間までの範囲内で就労要件等を問わず、保育所等が利用できる制度です。
  
  利用する前に市の認定を受ける必要がありますので、利用を希望される方は、認定の申請をしてください。
  
  実施場所（令和8年4月1日時点）
  
  	実施場所の一覧です。詳細はお問い合わせください。
  
  			名称
  			住所
  			定員
  			利用形態
  
  			あかり保育園飯能
  
  			柳町23-6
  
  			9
  
  			柔軟利用
  
  			学校法人さゆり学園
  
  			緑町2-5
  
  			12
  
  			定期利用
  
  利用対象者
  
  次の全てを満たすこども
  
  (1)生後6か月～満3歳未満
  
  (2)保育所、幼稚園、認定こども園、地域型保育事業所、企業主導型保育施設に在籍していない
  
  (3)飯能市に住所を有する
  
  （注意）
  
  実施施設により、受入可能年齢が異なります。
  
  利用可能時間
  
  こども1人につき月10時間まで
  
  （注意）
  
  ・月10時間を超えての利用はできません。
  
  ・未利用時間があっても翌月以降に繰り越すことはできません。
  
  利用料金
  
  こども1人につき1時間あたり300円（生活困窮家庭などは減額あり）
  
  （注意）
  
  ・金額は実施場所により異なります。
  
  ・給食代やおやつ代などは別途実費負担がかかります。
  
  ・予約後にキャンセルした場合にキャンセル料が生じる場合があります。
  
  利用形態
  
  事業所ごとに実施する利用方法が異なります
  
  (1)定期利用…利用する事業所、曜日や時間帯を固定し、定期的に利用する方法（同じ事業所を利用）
  
  (2)柔軟利用…利用する事業所、曜日や時間帯を固定せず、柔軟に利用する方法（複数施設を利用）
  
  ## 利用までの流れ
  
  全体の流れ
  
  1.認定の申請
  
  2.利用アカウント発行後、パスワードの登録
  
  3.面談の予約・面談の実施
  
  4.初回面談実施後の利用予約
  
  5.利用
  
  事前準備
  
  こども誰でも通園制度総合支援システムへの登録や利用のできる環境が必要です。
  
  総合支援システム
  
  1.認定の申請
  
  利用を希望する場合、認定申請が必要となります。
  
  こども誰でも通園制度総合支援システムまたは保育課の窓口で申請できます。
  
  2.利用アカウント発行後、パスワードの登録
  
  利用対象児童の確認後、認定証と「こども誰でも通園制度総合支援システム」の利用アカウントを発行します。
  
  認定申請時に入力したメールアドレス宛にアカウント登録完了メールが送信されます。メールの案内にしたがって、パスワードの登録を行ってください。
  
  3.面談の予約・面談の実施
  
  こども誰でも通園制度総合支援システムにこどもの情報等を登録後、システムで利用したい事業所を選び、面談の予約のうえ事業所と初回面談を行います。
  
  （注意）
  
  利用する事業所ごとに初回面談を行う必要があります。
  
  4.初回面談実施後の利用予約
  
  初回面談後、事業所での受入れが確定した後に、事業所の利用が可能になります。利用する事業所の利用予約を行ってください。
  
  5.利用
  
  利用後は、利用した事業所で利用料をお支払いください。
  
  注意事項
  
  ・事業所での面談で、集団保育にあたり特別な支援が必要と判断された場合など、認定されてもすぐにご利用になれない場合があります。
  
  ・初回もしくは慣れるまでの複数回、親子通園となる場合があります。
  
  ・各事業所には定員がありますので、利用希望者多数の場合には、利用できないことがあります。
  
  ・利用する事業所数に関わらず、月10時間を超えての利用はできません。
  
  ・予約をキャンセルした場合、キャンセル料がかかる場合があります。
  
  ・認定申請の同意事項や事業所でお渡しする重要事項説明書などをよくご確認のうえ、利用してください。
  
  ## よくある質問と回答
  
  Q生後6か月のこどもは、いつから利用できますか。
  
  A 生後6か月となる日から利用可能となります。認定開始日も生後6か月となる日からとなります。
  
  Q 初回面談は必ず受ける必要がありますか。
  
  A 初めて利用する事業所では、利用の前に、事前に初回面談を受けていただく必要があります。安全にお子様を預かるために、お子様の健康状態やアレルギー等の有無について聞き取りを行うほか、利用にあたっての注意事項等について説明いたします。
  
  Q 初回面談は親子で参加する必要がありますか。
  
  A 初回面談は、保護者とこどもが同席することを基本にお願いしています。参加が難しい場合は、各事業所にご相談ください。
  
  Q 初回面談の時間は、利用時間に含まれますか。
  
  Q 利用時間には含まれません。
  
  Q 何日前から予約できますか。
  
  A 予約可能日は事業所により異なりますので、事業所にご確認ください。
  
  Q 月の利用途中で満3歳を迎え、利用時間が10時間に達していない場合、当該月内で残りの利用時間を利用することはできますか。
  
  A 3歳の誕生日の前々日以降の利用はできません。
  
