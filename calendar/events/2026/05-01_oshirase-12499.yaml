description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  **令和8年2月24日に自治体情報システムの標準化へ移行しました。** 標準化により、住民サービスに関わる通知や様式の帳票レイアウトが全国で統一されます。対象は児童手当、住民基本台帳、戸籍、固定資産税、介護保険など20業務です。
  
  **各種証明書や郵送物の文字が「行政事務標準文字」に変更となり、氏名や住所のデザインが変わる場合があります。** 行政事務標準文字は、全自治体で統一した文字をもとにデジタル庁が作成したもので、効率的な行政サービスと大規模災害への迅速な対応を可能にします。
  
  また、市民税・県民税・森林環境税納税通知書や国民健康保険税納税通知書などの大量郵便物は、**新金沢郵便局（石川県金沢市）から差し出すため、郵便事情により到達に時間を要する場合があります。**
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/johosystem/12499.html

