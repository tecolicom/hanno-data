summary: "ℹ️ 自治体情報システムの標準化への対応について"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/johosystem/12499.html"
dtstart: "2026-05-01"
dtend: "2026-05-01"
description: |-
  飯能市は**令和8年2月24日（一部機能は1月14日）に自治体情報システムの標準化への移行を完了**しました。これは令和3年法律第40号に基づき、全国の自治体が住民サービスの基幹業務システムを国が定める標準仕様に統一する取組です。
  
  標準化により、**児童手当・住民基本台帳・戸籍・税務・福祉・介護保険など20業務の様式やレイアウトが全国統一**されます。各種証明書や郵送物に記載される氏名・住所の文字が「行政事務標準文字」に変更となり、デザインが異なる場合があります。
  
  また、市民税・県民税・森林環境税納税通知書や国民健康保険税納税通知書など大量郵便物の一部は、新たに**新金沢郵便局（石川県金沢市）から差し出す**ため、到達に時間を要する場合があります。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/johosystem/12499.html

