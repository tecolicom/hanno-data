description: |-
  4月25日（土曜日）、阿須運動公園ホッケー場で行われたALDER飯能の試合を観戦してまいりました。高円宮牌2026ホッケー日本リーグサムライリーグD2（ディビジョン2）の開幕戦 東京農業大学との試合は2-0で見事ALDER飯能が勝利しました。
  
  ディビジョン2での優勝及び来季のディビジョン1への昇格へ向け、皆様の応援をよろしくお願いします。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13512.html

