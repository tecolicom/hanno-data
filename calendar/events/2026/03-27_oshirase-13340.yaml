description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  **5月19日(火)・30日(土)「スゴ足のんびりウオーク5月」開催**
  
  飯能ウオーキング倶楽部主催。**集合時間は午前10時、場所は飯能市役所西側駐車場**。天候や参加人数により以下2つのコースから選定されます。
  
  （1）市役所→弁財天→智観寺→中山西信号→谷津田→能仁寺→中央公園→本郷浄水場→飯能河原飛び石橋→飯能駅→東飯能駅→市役所
  
  （2）市役所→飯能市内(下加治、双柳、加治など)→入間市内(新光、野田など)→仏子駅(電車で戻ります)
  
  距離は約7キロメートル、**予定時間は約2.5時間**。**参加費は無料**（保険は各自）。持ち物は飲み物、雨具、交通系ICカード、スゴ足手帳（お持ちの方）。**当日参加、申し込み不要**（集合時間までにお越しください）。天候等による中止確認は**前日午後3時以降に飯能ウオーキング倶楽部ホームページまたは恩田(090-2205-8073)へ**。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/hokencenter/13340.html

