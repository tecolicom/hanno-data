description: |-
  3月26日（木曜日）、飯能市内の新小学一年生の交通安全のために、飯能市交通安全推進協議会と飯能地方交通安全協会から「ランドセルカバー」、飯能警察署と飯能地方交通安全協会から親子で学ぶ交通安全冊子「おけいこランド」が贈呈されました。
  
  こどもたちが安全に通学できるよう活用させていただきますとともに、関係者の皆様に感謝申し上げます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202603/13358.html

