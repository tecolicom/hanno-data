description: |-
  🔄 内容更新 (公開日: 2026-07-23)
  
  AI による要約 (正確な情報は元記事をご確認ください)
  
  令和8年8月1日（土）16時30分から21時まで、飯能河原ステージ広場で「はんのう夏至祭 森と水と太陽のビアガーデン」を開催します。北欧の夏至祭をテーマとしたイベントで、キッチンカーによるアルコール含む飲食の販売、TSUMUZIバンドによるライブ演奏、かがり火による演出を予定しています。ご家族やご友人とお気軽にご来場ください。小雨決行ですが、荒天（台風、大雨、雷、河川増水等）により安全確保が困難と判断した場合は中止となります。中止の場合は奥むさし飯能観光協会のホームページでお知らせします。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/kikakuka/sangakukanrenkei/13947.html

