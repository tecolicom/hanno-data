description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-morimana-metsa-semi/
  
  メッツァビレッジでセミづくし！ 明るい時間にフィールドワークでセミの出てくる穴や抜け殻を観察し、見つけた抜け殻を標本にします。暗くなったらいよいよセミの羽化観察！ 何種類いるか、どのようなくらしをしているのかなど、徹底的にセミについて楽しみながら学べるツアー、自由研究にももってこいです！
  
  【利用料金】大人6,000円、学生5,000円、未就学児3,000円 （ガイド料、保険、材料費等）
  
  【定員】15名
  
  【ガイド】森のフィールド学舎スタッフ
  
  【持ち物】飲み物、軽食、軍手、筆記用具、雨具、虫よけスプレー
  
  【備考】森のフィールド学舎HP https://morinomanabiya168.wixsite.com/website

