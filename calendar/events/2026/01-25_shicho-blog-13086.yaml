description: |-
  1月25日（日曜日）、第24回奥むさし駅伝競走大会が開催されました。
  
  今大会も、全国的な駅伝競走大会で活躍している実業団、大学、高校のチーム、また、地元で結成されたチームなど175チームのご参加をいただきました。
  
  選手の皆様が奥武蔵路を力走する姿は、市民に大きな感動と活力を与えていただきました。
  
  入賞された選手の皆様おめでとうございます。そして、大会運営に携わっていただきました関係者の皆様に感謝申し上げます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202601/13086.html

