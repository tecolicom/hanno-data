description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-naguricanoe-canoesyokyu/
  
  カナディアンカヌーは、シングルブレードパドルを使って水面を軽やかに進む、アクティブでダイナミックなカヌーです。パドルで舵を取る感覚や、思い通りに操作するテクニックを楽しみながら身につけましょう。
  
  【利用料金】一人3,000円 （ガイド、保険、カヌーレンタル代）
  
  【定員】5名
  
  【ガイド】認定NPO法人名栗カヌー工房スタッフ
  
  【持ち物】飲み物（工房内に自動販売機あり）、帽子やサングラスなどの日差し対策用品
  
  【備考】認定NPO法人名栗カヌー工房 HP https://naguri-canoe.co.jp/

