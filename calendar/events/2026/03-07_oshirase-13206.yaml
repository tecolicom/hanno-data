description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  令和8年3月7日(土曜日)、東飯能駅の自由通路に「ムーミンママ」のオブジェを設置するお披露目セレモニーを開催しました。飯能駅に続く第2弾として、飯能市・株式会社ムーミン物語・西武鉄道株式会社・飯能商工会議所・一般社団法人奥むさし飯能観光協会で構成する「ムーミンに会えるまち、はんのう」プロジェクト推進協議会の事業です。飯能駅・東飯能駅がムーミンで結ばれることで、まちなか回遊の新たな軸となり、駅を起点とした「歩きたくなるまちづくり」を加速させ、中心市街地の賑わい創出と市内全域の活性化につなげます。セレモニーには飯能市長、関係企業・団体の代表、ムーミンキャラクター、Nicot飯能の園児10名が出席しました。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/kikakuka/sangakukanrenkei/13206.html

