description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  **令和8年3月7日(土)に東飯能駅でムーミンママのオブジェお披露目セレモニーを開催**しました。飯能駅に続き第2弾として設置されたこのオブジェにより、飯能エリアの二つの玄関口がムーミンで結ばれます。駅を起点とした「歩きたくなるまちづくり」をさらに進め、中心市街地の賑わい創出や市内全域の活性化、来訪者の高揚感の醸成につなげていきます。セレモニーには飯能市長、ムーミン物語・西武鉄道・飯能商工会議所・奥むさし飯能観光協会等の関係者が出席しました。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/kikakuka/sangakukanrenkei/13206.html

