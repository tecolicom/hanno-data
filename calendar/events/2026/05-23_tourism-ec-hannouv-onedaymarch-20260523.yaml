description: |-
  昨年までの「飯能新緑ツーデーマーチ」の約１０㎞のコースを飯能市の自然豊かな魅力を存分に学びながらご案内します。心地よい新緑の季節に、飯能河原、天覧山、吾妻峡、あさひ山などを巡りましょう。
  
