summary: "📝 市長：「災害時における福祉避難所の設営及び運営に関する協定」締結式"
url: "https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202602/13181.html"
dtstart: "2026-02-20"
dtend: "2026-02-20"
description: |-
  2月20日（金曜日）、学校法人さゆり学園と本市との「災害時における福祉避難所の設営及び運営に関する協定」締結式を行いました。
  
  昨年12月に、学校法人さゆり学園が運営される「認定こども園さゆり幼稚園」の施設整備に伴い、二次避難所として利用が可能である旨のお申し出がありました。
  
  災害時において、「認定こども園さゆり幼稚園」に指定避難所での避難生活が困難な乳幼児等が二次避難することで、避難者に安全で安心した環境を提供することができることから、調整を進め、協定の締結に至りました。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202602/13181.html

