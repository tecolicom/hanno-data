description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市では、**令和8年4月22日から10月28日** の期間、市内の公共施設や民間事業者の協力により、冷房の入った施設を「涼み処」として開放しています。外出先での熱中症予防に、営業時間内であればどなたでも利用できます。
  
  **涼み処の施設一覧**
  
  飯能地区では、こども図書館、市立図書館、博物館、飯能中央地区行政センター、丸広百貨店7階市民活動センター、および複数の協力薬局が参加しています。
  
  第二区地区は第二区地区行政センター、精明・双柳地区は精明地区行政センター、飯能市役所、各地区行政センター、総合福祉センター、協力薬局など、加治・美杉台地区、南高麗地区、吾野地区、東吾野地区、原市場地区、名栗地区にもそれぞれの地区行政センターや診療所、薬局が参加しています。
  
  各施設の開放可能日・開放時間は異なります。利用予定の施設の営業時間をご確認の上、ご利用ください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/hokencenter/9927.html

