description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  日本赤十字社埼玉県支部飯能地区では、国内義援金および海外救援金を受け付けています。
  
  **【国内義援金】**
  - 令和6年能登半島地震災害義援金（石川県・富山県・新潟県）受付終了予定日：令和9年3月22日
  - 令和6年9月能登半島大雨災害義援金（石川県）受付終了予定日：令和9年3月22日
  
  **【海外救援金】**
  - 中東人道危機救援金（令和9年3月23日まで）
  - バングラデシュ南部避難民救援金（令和9年3月23日まで）
  - ウクライナ人道危機救援金（令和9年3月23日まで）
  - イラン及び周辺国人道危機救援金（令和8年5月25日まで）
  - 無指定海外救援金（通年受付）
  
  **【受付場所・時間】**
  市役所本庁舎正面玄関総合案内（募金箱）または地域福祉課（1階11番窓口）。受付時間は平日8時30分～17時15分。領収書を希望される場合は、地域福祉課（1階11番窓口）でお申し出ください。
  
  お寄せいただいた義援金は、被災都道府県の義援金配分委員会へ全額をお送りします。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/chiikifukushika/12265.html

