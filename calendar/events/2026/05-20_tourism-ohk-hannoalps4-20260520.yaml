description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ohk-hannoalps4/
  
  伊豆ヶ岳から天覧山まで連なる、いわゆる飯能アルプスの脊梁を４回に分けて縦走します。4回目は東吾野駅から天覚山・久須美坂・永田山を越えて多峯主山･天覧山・飯能駅に向かいます。昼食はにこにこハウスの特製弁当をいただきます。
  
