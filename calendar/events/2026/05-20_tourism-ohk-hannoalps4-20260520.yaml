    description: |-
      Automated translation (refer to source for accuracy)

      Hanno Eco-Tourism Association: https://hanno-tourism.jp/hanno-eco/tour/ohk-hannoalps4/

      We traverse the backbone of the Hanno Alps—the ridge running from Izugatake to Tenranzana—over four separate outings. In this 4th section, we depart from Higashi-Agano Station, cross Tengakusan, Kusumisaka, and Nagatasana, then head to Takomineyama and Tenranzana, finishing at Hanno Station. Lunch is a special boxed meal from Nikoniko House.

      【Fee】
      ¥7,800 per person (includes guide, lunch, insurance)

      【Capacity】
      10 people

      【Guide】
      Akira Shimizu — Certified Mountain Guide, Japan Mountain Guides Association, Stage II

      【What to bring】
      Gloves, drinking water, hat, rain gear, snacks, towel
