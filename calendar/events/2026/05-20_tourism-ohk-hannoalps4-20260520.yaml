    summary: "Climbing guide tour: Hanno Alps full traverse Part 4 (from Higashi-Ono Station via Tengaku, Takamine, and Tenran Mountains to Hanno Station)"
    description: |-
      Automated translation (refer to source for accuracy)

      Hanno Eco-Tourism Association: https://hanno-tourism.jp/hanno-eco/tour/ohk-hannoalps4/

      We traverse the spine of the Hanno Alps—which runs from Izugatake to Tenran Mountain—over four separate outings. This fourth outing departs from Higashi-Ono Station, crosses Tengaku Mountain, Kusumi Pass, and Nagata Mountain, then continues over Takamine Mountain and Tenran Mountain to arrive at Hanno Station. Lunch will be a special bento box from Nikoniko House.

      【Cost】7,800 yen per person (includes guide fee, lunch, and insurance)

      【Capacity】10 people

      【Guide】Akira Shimizu—certified mountaineering guide, Stage II, Japan Mountain Guides Association

      【What to bring】Gloves, drinking water, hat, rain gear, snacks, towel
