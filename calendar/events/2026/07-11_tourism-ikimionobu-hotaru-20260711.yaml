description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ikimionobu-hotaru/
  
  美しい里地里山環境が残る天覧山の谷戸環境。普段なかなか歩くことのできない夜の森を、専門のガイドが解説しながら安心安全に散策します。そこで見られるホタルや夜行性の生きものたちの息遣いを感じてみましょう。このツアーは短い時間で楽しむことのできる、お手軽ツアーになります。ぜひお気軽に参加してみてください。
  
  【利用料金】1人2,500円、リピーター2,000円、一家族5,000円 （ガイド料、保険）
  
  【定員】12名
  
  【ガイド】児嶋翼（飯能市エコツーリズム市民ガイドの会 いきもの部）
  
  【持ち物】ライト（可能であればヘッドライト）、飲み物、雨具、リュックサックなど（両手が空くものがおすすめ）、タオル、虫よけスプレー

