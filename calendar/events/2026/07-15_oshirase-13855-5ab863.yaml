  埼玉県バス協会主催の就職説明会。埼玉県内のバス会社23社が出展し、各社の特徴や仕事内容について直接相談できます。養成制度のある企業や未経験者歓迎の企業も多数参加しており、普通免許のみの方も参加可能です。
  
  【日時】令和8年7月25日（土曜日）11時30分～16時30分（受付11時15分～16時00分）
  
  【場所】浦和コルソ7階 コルソホール（JR浦和駅西口徒歩1分）
  
  【参加費】無料
  
  【お問合せ】リッツMC株式会社 イベント運営事務局 電話03-5449-7216、Mail contact@ritzmc.co.jp
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/tosikensetubu/toshikeikakuka/kotsuseisaku/13855.html

