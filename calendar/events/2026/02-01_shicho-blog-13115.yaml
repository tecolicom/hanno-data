description: |-
  2月1日（日曜日）、飯能市民体育館メインアリーナにて開催された第50回加治卓球大会 開会式に出席してまいりました。
  
  この大会は地区住民のスポーツを振興し、体力づくりと相互親睦を図ることを目的としており、今回で50回目を迎えた歴史と伝統のある大会です。
  
  開催にあたり、ご尽力いただきました関係者の方々に感謝申し上げます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202602/13115.html

