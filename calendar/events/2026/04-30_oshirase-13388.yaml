description: |-
  飯能市の令和8年度の主な報道発表資料一覧です。
  
  **令和8年4月30日**：市役所職員の服装を通年ノーネクタイ等に変更します。
  
  **令和8年4月24日**：青梅信用金庫から飯能市への寄附がありました。
  
  **令和8年4月22日**：有間エリア水源林保全プロジェクト（通称「クマタカとヤマネの森プロジェクト」）が始動します。
  
  **令和8年4月20日**：飯能ロータリークラブから飯能市への寄附金贈呈式が開催されました。
  
  **令和8年4月6日**：MXモバイリング株式会社から企業版ふるさと納税による寄附がありました。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/hishokohoka/hisho/hodohappyo/houdouhappyou2025_1/13388.html

