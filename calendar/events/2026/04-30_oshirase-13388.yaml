  # 令和8年度 飯能市報道発表資料
  
  **令和8年4月30日**  
  通年ノーネクタイ等の実施。服装の目安については別紙資料参照。
  
  **令和8年4月24日**  
  青梅信用金庫から飯能市への寄附。
  
  **令和8年4月22日**  
  有間エリア水源林保全プロジェクト（通称「クマタカとヤマネの森プロジェクト」）を始動。
  
  **令和8年4月20日**  
  飯能ロータリークラブから飯能市への寄附金贈呈式を実施。
  
  **令和8年4月6日**  
  MXモバイリング株式会社から企業版ふるさと納税による寄附。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/hishokohoka/hisho/hodohappyo/houdouhappyou2025_1/13388.html

