description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  公共施設でのキッチンカー等出店の社会実験を実施します。**実施期間は令和8年4月1日から令和8年6月30日まで**。一般社団法人奥むさし飯能観光協会と協働で行い、出店事業者は同協会の会員に限定する予定です。
  
  実施場所は市役所、図書館、公園など公共施設の出店エリアで、観光協会との対話により決定します。具体的な出店情報は同協会がSNS等で周知予定です。
  
  本トライアルは、市民の利便性向上、地元事業者のビジネス機会創出、持続可能な行政運営の実現を目指す「三方良し」の取組です。利用者の満足度もアンケートで把握し、実施後は検証結果をホームページで公表します。その上で本格的な導入や他の公共施設での出店も検討する予定です。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/shisankeieika/13132.html

