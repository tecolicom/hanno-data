summary: "ℹ️ 公共施設におけるキッチンカー等出店のトライアル・サウンディングについて"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/shisankeieika/13132.html"
dtstart: "2026-02-20"
dtend: "2026-02-20"
description: |-
  **令和8年4月1日から6月30日まで**、公共施設におけるキッチンカー等出店の社会実験を実施します。一般社団法人奥むさし飯能観光協会と協働で、市役所・図書館・公園などの出店エリアを決定予定です。出店はその会員に限定され、具体的な出店情報は観光協会が SNS 等で周知します。
  
  本トライアル・サウンディングは、民間事業者のノウハウを活かしながら、市民の利便性向上、地元事業者の新たなビジネス機会創出、持続可能な行政運営の実現を目指すもの。利用者の満足度もアンケートで把握する予定です。実施後は検証結果を市ホームページで公表し、その結果を踏まえて本格的な導入や他の公共施設での出店も検討します。
  
  詳細は実施要領をご覧ください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/shisankeieika/13132.html

