description: |-
  5月2日（土曜日）、飯能市市民活動センターにて開催された令和8年度飯能市国際交流協会定期総会に出席してまいりました。
  
  飯能市国際交流協会の皆様におかれましては、本市における国際交流の中核を担っていただいておりますことに厚く御礼申し上げます。多文化共生社会の実現のため、今後も変わらぬご支援を賜りますよう、よろしくお願い申し上げます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202605/13533.html

