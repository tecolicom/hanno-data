  🔄 内容更新 (公開日: 2026-06-13)
  
  ## 市道第1地区第8号線の通行止め解除のお知らせについて
  
  令和8年6月12日（金曜日）13時より実施していた市道第1地区第8号線の倒木による通行止めを令和8年6月13日（土曜日）9時40分をもちまして解除いたしました。
  
  通行止め期間中は、迂回や交通渋滞等により、市民の皆様をはじめ道路利用者の皆様にご不便とご迷惑をおかけしましたことをお詫び申しあげます。
  
  ご理解とご協力をいただき、誠にありがとうございます。
  
