      Hanno Ecotourism Association: https://hanno-tourism.jp/hanno-eco/tour/ec-chokotto-tenranzan-syoka/

      Walk with a guide and discover the small changes in nature you might miss on an ordinary walk. This is a quick, easy-to-join tour perfect for a short outing. Please feel free to participate! Depending on the season, you may also receive homemade pesticide-free vegetables as a gift.

      【Fees】
      ¥2,000 per person; ¥1,500 for returning participants; ¥4,000 per family (includes guide fee and insurance)

      【Capacity】
      10 people

      【Guide】
      Kojima Tsubasa (Hanno Ecotourism Citizen Guides Association — Wildlife Division)

      【What to bring】
      Drink, rain gear, backpack or similar (something that keeps both hands free is recommended), towel
