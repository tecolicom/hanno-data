summary: "ℹ️ 令和8年度病害虫発生予察注意報第1号「ムギ類赤かび病」（令和8年4月27日）"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/kankyokeizaibu/nogyoshinkoka/9873.html"
dtstart: "2026-04-27"
dtend: "2026-04-27"
description: |-
  ムギ類赤かび病の感染に好適な気象条件が続くとして、**令和8年4月27日に注意報が発表**されました。4月1日から26日までの子のう胞子飛散好適日は11日（平年同期7.9日）と過去10年で3番目に多く、特に4月14～16日と23～25日は3日間連続で飛散好適日が出現しています。11月中下旬に播種した小麦が開花期を迎える時期と一致しており、感染リスクが高まっています。向こう1か月は気温が高く晴れの日が少ない予報のため、本病の発生量増加が懸念されます。**発生が見られる小麦ほ場では追加の防除実施を推奨**します。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kankyokeizaibu/nogyoshinkoka/9873.html

