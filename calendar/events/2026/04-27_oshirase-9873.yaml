description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  ムギ類赤かび病の感染に好適な気象条件が予想されるため、注意報が発令されました。
  
  4月1日から26日までの子のう胞子飛散好適日は**11日**（平年同期7.9日、過去10年で3番目に多い）。特に4月14～16日と23～25日は3日間連続で飛散好適日が出現し、11月中下旬播種の小麦の開花期とほぼ一致しています。
  
  向こう1か月は**気温が高く、晴れの日が少ないため、本病の感染に好適な気象条件になることが予想**されています。
  
  発生が見られる小麦ほ場では、**追加の防除を実施してください**。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kankyokeizaibu/nogyoshinkoka/9873.html

