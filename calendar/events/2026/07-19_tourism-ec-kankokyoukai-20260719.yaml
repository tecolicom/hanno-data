description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-kankokyoukai/
  
  某情報番組で取りあげられた底抜け屋台。飯能夏祭りは「飯能の底抜け屋台行事」として市の無形民俗文化財に指定されています。地元の人たちと一緒に巡行や、８ヵ町の底抜け屋台が一堂に会する引き合わせに参加し夏祭りを満喫しましょう！お祭り博士の楽しい解説と、飯能のイメージキャラクター夢馬の特製キーホルダー付きで親子でも楽しめるツアーです。
  
  【利用料金】一人3,000円、小学生以下2,000円 （ガイド料、保険代、軽食代、謝礼など）
  
  【定員】10名
  
  【ガイド】(一社)奥むさし飯能観光協会スタッフ 小槻成克（通貮親和會） 協力：二丁目町内会
  
  【持ち物】飲み物、汗拭きタオル

