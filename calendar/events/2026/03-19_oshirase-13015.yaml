description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  **こども誰でも通園制度**は、就労要件を問わず、保育所等に通っていない生後6か月以上満3歳未満のこどもが、月10時間までの範囲内で保育所等を利用できる制度です。
  
  **利用対象**は、飯能市に住所があり、保育所・幼稚園・認定こども園等に在籍していない生後6か月～満3歳未満のこども。
  
  **実施施設**（令和8年4月1日時点）は、あかり保育園飯能（定期利用）、学校法人さゆり学園（柔軟利用）の2か所。
  
  **利用料金**は1時間あたり**300円**（生活困窮家庭は減額あり）。給食代やおやつ代は別途実費。
  
  **利用までの流れ**は、①市の認定申請（総合支援システムまたは保育課窓口）→②アカウント発行・パスワード登録→③初回面談の予約・実施→④利用予約→⑤利用。各事業所での初回面談は必須で、基本的に親子同席です。
  
  月10時間を超えての利用はできず、未利用時間の繰り越しはできません。事業所の定員により利用できない場合もあります。予約キャンセル時はキャンセル料が発生する場合があります。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kodomoshienbu/hoikuka/13015.html

