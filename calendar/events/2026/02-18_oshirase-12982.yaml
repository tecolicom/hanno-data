description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  **令和8年4月1日**に、飯能市内の一般国道299号の一部区間が廃止されます。
  
  **飯能市道へ移管される区間**は、飯能駅前交差点から入間市境までで、**飯能市道第1地区第2,961号線**となります。移管に伴い、道路占用申請や工事施行承認申請などの各種申請先は**飯能市役所**に変わります。
  
  **県道へ変更となる区間**は2つあります。中山陸橋（西）交差点から東町交差点までは**主要地方道青梅飯能線**に、東町交差点から飯能駅前交差点までは**一般県道飯能停車場線**となり、埼玉県（飯能県土整備事務所）が管理します。
  
  このほか、入間市・狭山市内の区間は各市の市道に移管されます。詳細は飯能県土整備事務所（042-973-2281）または川越県土整備事務所（049-243-2020）へお問い合わせください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/tosikensetubu/ijikanrika/12982.html

