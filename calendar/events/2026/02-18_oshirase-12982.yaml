summary: "ℹ️ 一般国道299号の一部区間の飯能市道への移管及び県道への変更について"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/tosikensetubu/ijikanrika/12982.html"
dtstart: "2026-02-18"
dtend: "2026-02-18"
description: |-
  **令和8年4月1日に、飯能市内の一般国道299号の一部区間が廃止**される予定です。
  
  **飯能市道へ移管される区間**は、飯能駅前交差点（柳町地内）から入間市境（岩沢地内）までで、路線名称は「飯能市道第1地区第2,961号線」になります。移管に伴い、道路占用申請や工事施行承認申請などの各種申請先は飯能市役所となります。
  
  **県道に変更となる区間**は、中山陸橋（西）交差点（中山地内）から飯能駅前交差点（柳町地内）までで、埼玉県（飯能県土整備事務所）が管理を継続します。その内、中山陸橋（西）交差点から東町交差点までは主要地方道青梅飯能線に、東町交差点から飯能駅前交差点までは一般県道飯能停車場線になります。
  
  なお、入間市・狭山市内の区間は各市の道路に移管されます。詳細は飯能県土整備事務所（042-973-2281）または川越県土整備事務所（049-243-2020）までお問い合わせください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/tosikensetubu/ijikanrika/12982.html

