description: |-
  飯能市では、消費喚起による地域事業者支援、物価高騰下における市民の消費下支えを目的に、国の「物価高騰対応重点支援地方創生臨時交付金」を活用し、市内店舗で利用できるプレミアム付デジタル商品券を販売します。
  
  事業の詳細については、広報はんのう6月号及び本ページにてお知らせいたします。
  
  今しばらくお待ちください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kankyokeizaibu/sangyoshinkoka/13410.html

