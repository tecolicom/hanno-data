description: |-
  3月22日（日曜日）、阿須小久保線（岩沢工区）の開通式を行いました。
  
  この阿須小久保線は、昭和41年の都市計画決定以来、市街地を南北に縦貫する道路として、その実現には市民の皆様から多くの期待が寄せられていたところです。
  
  岩沢工区は、令和3年度の岩沢陸橋開通に続けて整備を進め、地域の皆様の温かいご協力をいただいて、国道299号までの区間を開通することができました。
  
  この区間の開通により、阿須方面から国道299号までのアクセスの向上や歩行者通行の安全など、市民生活の利便性向上に寄与することはもちろん、災害などいざという時の地域防災力の向上にも大きく貢献できることと期待しております。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202603/13338.html

