summary: "📝 市長：阿須小久保線（岩沢工区）開通式"
url: "https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202603/13338.html"
dtstart: "2026-03-22"
