  **浅間地内雨水排水対策工事に伴う市道通行止めとバス経路変更**
  
  飯能市大字双柳地内で雨水排水対策工事を実施します。
  
  **工事期間：令和8年3月30日から令和8年6月30日まで（予定）**
  施工時間は午前9時から午後5時まで。
  
  **通行止め区間：市道1-15-2号線**
  
  これに伴い、国際興業バスの「浅間」バス停経路が変更されます。**令和8年3月30日から令和8年6月30日まで（予定）、祝日を除く月曜日から土曜日の午前9時から午後5時の間、「浅間」バス停の発着便が迂回運行**となります。この期間中に「浅間」バス停をご利用の場合は、「工場前」バス停または「市営住宅」バス停をご利用ください。詳細はバス停掲示をご確認ください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/tosikensetubu/tosiseibika/13270.html

