summary: "ℹ️ 浅間地内雨水排水対策工事に伴う市道の通行止め及びバス経路変更のお知らせ"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/tosikensetubu/tosiseibika/13270.html"
dtstart: "2026-03-23"
dtend: "2026-03-23"
description: |-
  **浅間地内雨水排水対策工事**に伴い、市道の通行止めと国際興業バスの経路変更を実施します。
  
  **工事期間：令和8年3月30日～令和8年6月30日**（予定）
  **施工時間：午前9時～午後5時**
  **工事場所：飯能市大字双柳地内**
  
  工事内容は排水構造物工、舗装工です。市道1-15-2号線が通行止めとなります。
  
  **バス経路変更：** 工事期間中の祝日を除く月曜日～土曜日の午前9時～午後5時に、「浅間」バス停への発着便が迂回運行となります。この時間帯に「浅間」バス停をご利用の際は、「工場前」バス停または「市営住宅」バス停をご利用ください。詳細は「浅間」バス停の掲示をご確認ください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/tosikensetubu/tosiseibika/13270.html

