  🆕 新着掲載 (公開日: 2026-06-25)
  
  〇台風が接近しています
  
  週末にかけて風雨が強まる可能性があります。
  
  事前の備えをお願いします。
  
  ・懐中電灯、電池、携帯ラジオの準備
  
  ・携帯電話の充電
  
  ・飲料水等の確保
  
  ・家の周りの点検
  
  ・飛ばされやすいものを室内へ など
  
  〇台風の進路や強さは変化する可能性があります。
  
  最新の気象状況を継続的に確認してください。
  
