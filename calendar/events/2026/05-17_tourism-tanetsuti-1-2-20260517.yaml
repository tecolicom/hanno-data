      Hanno Ecotourism Association: https://hanno-tourism.jp/hanno-eco/tour/tanetsuti-1-2/

      Learn kinoko-chan farming—a method using fallen leaves and branches to create nutrient-rich beds—as you plant summer vegetables and build rows. Our advisors will teach you planting techniques and growing tips in an easy-to-understand way. Lunch at restaurant "La Nora" features Italian dishes made with kinoko-chan vegetables.

