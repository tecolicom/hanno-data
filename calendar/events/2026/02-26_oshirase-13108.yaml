description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市立図書館及びこども図書館の開館時間・休館日が、**令和8年4月1日（水曜日）から変更**されます。試行期間は令和9年3月31日までです。
  
  **市立図書館**
  - 開館時間：火曜日～日曜日 9:30～18:00
  - 休館日：月曜日（祝・休日を除く）、祝日の翌日（祝・休日の場合は開館）、館内整理日（毎月最終金曜日、祝・休日を除く）、特別整理期間（年1回、5日間）、年末年始
  
  **こども図書館**
  - 開館時間：火曜日～日曜日 11:00～16:00
  - 休館日：市立図書館に同じ
  
  また、**令和8年4月1日から名栗・富士見分室を廃止し、移動図書館を休止**いたします。名栗地区行政センター及び富士見地区行政センターでは新たに「配本サービス」を開始します。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kyoikubu/toshokan/13108.html

