summary: "📝 市長：「ちふれASエルフェン埼玉」表敬訪問"
url: "https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202605/13592.html"
dtstart: "2026-05-20"
