  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/cockroach/
  
  暑い夏はゴキブリもアツい！ 身近な嫌われ者のゴキブリ。しかし、そんな彼らが自然では重要な存在であることを知っていますか？ ゴキブリの役割や生態を知ってみると、家で出会ったときの見方がちょっぴり変わるかもしれません。ゴキブリ好きのお兄さんたちと一緒にゴキブリの意外な一面を探しに行きましょう。
  
