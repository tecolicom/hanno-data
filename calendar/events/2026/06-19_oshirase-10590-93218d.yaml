  🆕 新着掲載 (公開日: 2026-06-19)
  
  ## イベント内容
  
  	期日 8月4日(火曜日)
  
  	集合時間 10時
  
  	集合場所 飯能市役所西側駐車場
  
  	コース 市役所 → 山手町自然歩道入口 → 谷津田再生地 → 能仁寺 → 中央公園 → 飯能河原 → 飯能駅 → 市役所
  
  	距離  約8キロメートル
  
  	予定時間 約2時間30分
  
  	費用 200円(保険代等、当日集金)
  
  	持ち物   弁当、飲み物、雨具、スゴ足手帳(お持ちの方)
  
  	申し込み  7月31日（金曜日）までにASA飯能へ 電話 042-972-4701 ファックス 042-974-2190
  
  	中止の確認  天候等による中止の確認は、当日9時以降にASA飯能へ。
  
  	問い合わせ 恩田 090-2205-8073
  
  	主催  飯能ウオーキング倶楽部
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/hokencenter/10590.html

