  【電話番号】042‐978‐1922
  
  【ファクス番号】042‐970‐2540
  
  【事業所番号】1162690022
  
  (注意)訪問看護ステーションほほえみは、東吾野医療介護センター内に事務所があります。
  
  地階に専用入口があります。
  
