  ## 業務内容のご案内
  
  かかりつけの医師の指示に基づいて看護師等が訪問し、その方に必要な看護や介護のお世話を行い、在宅における療養生活を支援します。
  
  秘密は厳守いたします。お気軽にご相談ください。
  
  訪問日
  
  月曜日～金曜日
  
  訪問回数
  
  原則、週3回まで (状態により異なります)
  
  業務時間
  
  午前8時30分～午後5時15分
  
  休日
  
  土曜、日曜、祝日、年末年始(12月29日～1月3日)
  
  サービス内容
  
  	病状の観察をします。
  
  	床ずれの予防や手当をします。
  
  	身体の動かし方や移動の仕方をお教えし、車椅子による散歩の介助、又ご自宅でできるリハビリテ-ションを行います。
  
  	チュ-ブ、管等を装着されている方には、管理のお手伝い又は、方法をお教えします。
  
  	ご家族からの療養上の相談に応じます。
  
  	体を拭いたり、髪を洗ったり、入浴の介助も行います。
  
  	食事や排泄の介助を行います。
  
  	認知症患者の看護を行います。
  
  	精神疾患患者の看護を行います。
  
  	その他医師の指示による医療処置を行います。
  
  オンライン資格確認について
  
  当ステーションでは、マイナンバーカードを利用した「オンライン資格確認システム」を導入しています。
  
  マイナンバーカード（マイナ保険証）をご利用いただくことで、保険資格の確認がスムーズになり、必要に応じて薬剤情報や診療情報等が確認できるため、より安心・安全なサービス提供につながります。
  
  訪問看護をご利用の際は、マイナンバーカード（マイナ保険証）または健康保険証をご準備ください
  
  マイナンバーカードの健康保険証利用について
  
  医療系施設におけるサイバーセキュリティを確保するための方針について
  
  地方自治法の改正により、普通地方公共団体の議会、長及びその他の執行機関は、それぞれ管理する情報システムの利用にあたってのサイバーセキュリティを確保するための「方針」を定め、公表することが義務付けられました。
  
  これらを踏まえ、訪問看護ステーションほほえみでは、厚生労働省より示されているガイドラインに基づき策定した「オンライン資格確認等システム及びレセプトのオンライン請求システムに係る安全対策基準」を、自治法上の「サイバーセキュリティを確保するための方針」と位置づけることで、さらなるサイバーセキュリティの確保を行ってまいります。
  
  オンライン資格確認等システム安全対策基準 (PDFファイル: 144.1KB)
  
