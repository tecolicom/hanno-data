description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-ikimonobu-tenranzan-summer/
  
  普段の散歩ではなかなか気づかない自然の変化を、ガイドと一緒に歩きながら探してみませんか？ このツアーは短い時間で楽しむことのできる、お手軽ツアーになります。ぜひお気軽に参加してみてください。季節によっては自家製無農薬野菜もプレゼントします！
  
  【利用料金】1人2,000円、リピーター1,500円、一家族4,000円 （ガイド料、保険）
  
  【定員】各日10名
  
  【ガイド】児嶋翼（飯能市エコツーリズム市民ガイドの会 いきもの部）
  
  【持ち物】飲み物、雨具、リュックサックなど（両手が空くものがおすすめ）、タオル、虫よけスプレー

