description: |-
  4月18日（土曜日）、わせがく夢育高等学校2026年度入学式に出席してまいりました。
  
  わせがく夢育高等学校は、東吾野地区の皆さんとともに様々な体験、経験を積むことができる学校です。地域とともに歩み、成長し続けていくこの学校で、生徒の皆さんが「将来の夢」を見つけ、その実現に向けて、成長し、大きく羽ばたかれることを心から期待しています。入学おめでとうございます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13468.html

