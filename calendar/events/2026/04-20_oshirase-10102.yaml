description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  **熱中症特別警戒アラート**が発表された際に、市内公共施設及び民間施設がクーリングシェルターとして開放されます。
  
  **運用期間：令和8年4月22日（水曜日）から10月28日（水曜日）まで**
  
  暑さ指数（WBGT）が翌日35以上と予測される場合にアラートが発表され、防災行政無線や防災メールでお知らせします。やむを得ず外出した際には、暑さを避けるためクーリングシェルターをご活用ください。
  
  市内には飯能地区、第二区地区、精明・双柳地区、加治・美杉台地区、南高麗地区、吾野地区、東吾野地区、原市場地区、名栗地区に複数の施設が指定されており、**各施設の営業時間内での開放**となります。施設ごとに開放日時と定員が異なるため、ご利用前にご確認ください。ご利用時は各施設の指示に従い、静かにお過ごしください。
  
  **お問い合わせ：保健センター（042-974-3488）**
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/hokencenter/10102.html

