summary: "📝 市長：令和8年春の全国交通安全運動出発式"
url: "https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13405.html"
dtstart: "2026-04-02"
