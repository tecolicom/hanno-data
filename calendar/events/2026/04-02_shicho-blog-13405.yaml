description: |-
  4月2日（木曜日）、双柳地区行政センターにて、令和8年春の全国交通安全運動出発式が執り行われ、来賓として出席いたしました。
  
  この出発式は警察署、自治体及び各交通関係団体の交通安全に向けた意思統一及び気運の醸成並びに市民の交通事故防止意識の高揚を図るため行われました。
  
  今後も交通事故防止のため、関係機関が一丸となって取り組んでまいります。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13405.html

