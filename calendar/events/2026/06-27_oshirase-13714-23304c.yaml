  🆕 新着掲載 (公開日: 2026-06-25)
  
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市緊急財政対策により休止していた観光公衆トイレ7か所を再開いたします。
  
  【再開時期】
  ・7月上旬：竹寺観光公衆トイレ（大字南704番地）、竹寺入口観光公衆トイレ（大字南750番地1）、阿寺諏訪神社観光公衆トイレ（大字長沢1843番地）
  ・再開準備中：中居観光公衆トイレ（大字中居219番地）、飯能観光案内所観光公衆トイレ（大字飯能1051番地8）、小沢観光公衆トイレ（大字下名栗1128番地1）、河又観光公衆トイレ（大字下名栗558番地1）
  
  再開時期については、随時更新いたします。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kankyokeizaibu/kanko/13714.html

