description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市は極めて厳しい財政状況に直面しており、**歳出に対して市税等の歳入が著しく不足している**ため、事務事業の見直しを段階的に進めています。
  
  **見直し検討シート公表済み：**
  - **令和7年8月版（第1弾）** 
  - **令和7年10月版（第2弾）**：第1弾から更に踏み込んだ見直しを実施。それでも約9.5億円の一般財源不足が残る
  - **令和7年11月版（第3弾）**：極めて厳しい追加見直しを実施するも、なお10億円以上の収支乖離が存在
  - **令和8年1月版（第4弾）**：市民意見等を踏まえ一部見直しを改め、辛うじて財政調整基金に頼らない予算編成の見込みが得られた。ただし、国の臨時交付金活用、特別職・職員給与削減、職員数削減等による応急処置的対応による
  - **確定版**：3月定例会提出の令和8年度予算案と整合させたもの。市民意見や基金残高見込みを踏まえ、社会保障関連経費等の復活財源として基金から最低限の繰入れを実施
  
  見直し対象事業は、受益者負担見直し・継続、規模縮小、休止・廃止、先延ばしに区分されます。市は「本市始まって以来の最大の危機」と認識し、限られた財源で市民の幸せ最大化を目指す自治体経営への構造転換を進めています。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/zaiseika/kinkyuuzaiseitaisaku/12184.html

