description: |-
  4月28日（火曜日）、飯能ロータリークラブ様より、小・中学生の環境教育のために役立ててほしいとの趣旨により、ご寄附をいただきました。
  
  令和4年度から同様の趣旨でご寄附をいただき、令和4年度・令和6年度は飯能市立の小学校、令和5年度・令和7年度は飯能市立の中学校で環境学習用品を購入させていただきました。
  
  今回いただいた寄附金につきましても、趣旨に沿うよう有効に活用させていただきます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13514.html

