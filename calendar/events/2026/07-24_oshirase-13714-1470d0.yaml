  ・河又観光公衆トイレ(大字下名栗558番地1):7月1日再開
  ・中居観光公衆トイレ(大字中居219番地):7月13日再開
  ・飯能観光案内所観光公衆トイレ(大字飯能1051番地8):7月24日再開
  
  再開時期は随時更新されます。
  
