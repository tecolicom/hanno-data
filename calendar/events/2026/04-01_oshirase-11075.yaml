description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市役所本庁舎市民課ロビーに**証明書交付端末**が令和7年2月3日より設置されました。マイナンバーカードと**利用者証明用電子証明書の暗証番号(数字4桁)** を入力することで、窓口に並ばずに住民票の写しなどの証明書が取得できます。
  
  **利用時間は平日午前9時から午後4時30分まで**（市役所本庁舎開庁時間と同じ）。年度末・年度初めの休日開庁日など一部休日でも利用できる場合があります。
  
  **支払いは現金のみ**。使用可能な硬貨は5円・10円・50円・100円・500円、紙幣は1,000円です。両替はできません。市の条例で手数料免除となる場合も、端末での取得は有料となります。手数料免除を希望する場合は窓口でご請求ください。
  
  その他注意事項として、発行後の差し替え・返金不可、複数枚取得時のホチキス留めなし、印鑑登録証は取得不可、マイナンバーカード暗証番号3回誤入力でロック、などがあります。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/shiminseikatsubu/shiminka/11075.html

