summary: "📝 市長：駿河台大学寄附講座ガイダンス"
url: "https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13455.html"
dtstart: "2026-04-14"
