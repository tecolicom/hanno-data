description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  課税(非課税)・所得証明書のコンビニ交付サービスを、**令和8年5月31日(日曜日)～令和8年6月2日(火曜日)終日停止**します。年度更新作業に関するシステムメンテナンスのためです。令和8年度の証明書交付は**6月3日(水曜日)から**となります。
  
  停止期間中に証明書が必要な場合は、以下の窓口をご利用ください。
  
  **市役所・各地区行政センター(富士見地区行政センターを除く)**
  午前9時～午後4時30分
  
  **飯能駅サービスコーナー**
  午前9時～午後5時(税証明の即日交付受付は午前9時～午後4時30分)
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/johosystem/13166.html

