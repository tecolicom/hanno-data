description: |-
  **令和8年5月31日(日曜日)～6月2日(火曜日)終日**、システムメンテナンスのため課税(非課税)・所得証明書のみコンビニ交付サービスを停止します。令和8年度の証明書交付開始は6月3日(水曜日)からです。
  
  休止期間中に証明書の発行が必要な場合は、以下の窓口をご利用ください。
  
  **市役所・各地区行政センター(富士見地区行政センター除く)：午前9時～午後4時30分**
  
  **飯能駅サービスコーナー：午前9時～午後5時(税証明の即日交付受付は午前9時～午後4時30分)**
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/johosystem/13166.html

