summary: "ℹ️ 貯水槽水道（受水槽）の適正な管理について"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/jogesuidobu/suidokomuka/13444.html"
dtstart: "2026-04-15"
dtend: "2026-04-15"
description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  有効容量が**10立方メートルを超える貯水槽（受水槽）**を有する施設の設置者・管理者は、水道法に基づき「簡易専用水道」として適切な維持管理が義務付けられています。
  
  定期的に実施する事項は以下の通りです。
  
  ・**貯水槽（受水槽）の清掃**：1年に1回以上
  ・**水質検査**：1年に1回、登録検査機関にて実施
  
  浄水場でつくられた安全な水を各家庭へ適切に供給するためには、貯水槽水道の衛生管理が重要です。また、有効容量10立方メートル以下の小規模貯水槽水道の場合でも、同様の管理に努めてください。なお、清掃や水質検査を行った場合、水道工務課への報告は不要です。
  
  （注）自己水源等により給水する施設で居住者101人超、導管延長1,500メートル超、または受水槽容量100立方メートル超のものは「専用水道」に該当し、別途管理が必要です。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/jogesuidobu/suidokomuka/13444.html

