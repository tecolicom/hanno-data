summary: "ℹ️ 貯水槽水道（受水槽）の適正な管理について"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/jogesuidobu/suidokomuka/13444.html"
dtstart: "2026-04-15"
dtend: "2026-04-15"
description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  有効容量が10立方メートルを超える貯水槽（受水槽）を有する施設は、水道法に基づき「簡易専用水道」として適切な維持管理が義務付けられています。
  
  【定期的に実施する事項】
  ・貯水槽（受水槽）の清掃：1年に1回以上
  ・水質検査：1年に1回、登録検査機関にて実施
  
  設置者及び管理者の皆様は、浄水場でつくられた安全な水を各家庭へ適切に供給するため、貯水槽水道の衛生管理に努めてください。
  
  有効容量10立方メートル以下の小規模貯水槽水道の場合でも、簡易専用水道と同様の管理を行うよう努めてください。
  
  清掃や水質検査等を行った場合の水道工務課への報告は不要です。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/jogesuidobu/suidokomuka/13444.html

