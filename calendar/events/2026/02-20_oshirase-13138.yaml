description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市は令和8年2月20日に定例記者会見を開催します。
  
  【提出予定案件】
  ・第6次飯能市総合振興計画実施計画 令和8年度重点施策（第3期飯能市まち・ひと・しごと創生総合戦略）（案）
  ・第8次飯能市行政改革大綱（案）
  ・飯能市長等及び職員の給与の特例について
  ・令和8年度予算案の概要
  ・緊急財政対策について
  ・公共施設におけるキッチンカー等出店のトライアル・サウンディングの実施
  ・「阿須小久保線（岩沢工区）の開通」について
  ・令和8年度からスタートする計画について
  
  各案件に関する詳細な資料（PDFファイル）が市公式サイトに掲載されています。
  
