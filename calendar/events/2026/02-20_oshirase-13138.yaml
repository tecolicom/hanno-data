description: |-
  令和8年2月20日に開催される定例記者会見の提出予定案件です。
  
  **第6次飯能市総合振興計画実施計画 令和8年度重点施策（第3期飯能市まち・ひと・しごと創生総合戦略）** や **第8次飯能市行政改革大綱（案）**、**令和8年度予算案の概要** のほか、飯能市長等及び職員の給与の特例、緊急財政対策、事業見直し検討結果などが発表される予定です。
  
  また、公共施設におけるキッチンカー等出店のトライアル・サウンディング実施、**阿須小久保線（岩沢工区）の開通** など、令和8年度からスタートする各種計画・事業についても説明されます。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/hishokohoka/hisho/hodohappyo/houdouhappyou2025/13138.html

