description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  令和8年2月20日に飯能市定例記者会見が開催されます。提出予定案件は以下の通りです。
  
  **第6次飯能市総合振興計画実施計画 令和8年度重点施策**（第3期飯能市まち・ひと・しごと創生総合戦略案）、**第8次飯能市行政改革大綱案**、飯能市長等及び職員の給与の特例、**令和8年度予算案の概要**、緊急財政対策、公共施設におけるキッチンカー等出店のトライアル・サウンディング実施、**阿須小久保線（岩沢工区）の開通**、令和8年度からスタートする計画についての報告・提案が予定されています。
  
  詳細は各資料（PDF）をご参照ください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/hishokohoka/hisho/hodohappyo/houdouhappyou2025/13138.html

