description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-cyokotto-lighttrap/
  
  普段なかなか歩くことのできない夜の森を、専門のガイドが夜活動する生きものを探しながらご案内します。今回はライトトラップも使って、灯りに集まる夏の昆虫をご紹介したいと思います。夜の森ならではのワクワク、ドキドキを体験しながら、自然や生きものの面白さ・大切さをお伝えします。
  
  【利用料金】一人2,500円、リピーター2,000円、一家族5,000円 （保険、ガイド料）
  
  【定員】20名
  
  【ガイド】児嶋翼（飯能市エコツーリズム市民ガイドの会 いきもの部）
  
  【持ち物】ライト（あればヘッドライト）、飲み物、雨具、リュックサックなど（両手が空くものがおすすめ）、タオル、虫よけスプレー、長袖・長ズボン、履きなれた滑りにくい運動靴、帽子

