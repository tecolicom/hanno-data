description: |-
  # 飯能市報道発表資料（令和7年度）
  
  **令和8年3月31日：クマ等の出没に備えた緊急銃猟想定訓練を実施**
  
  **令和8年3月30日：「天覧山の鏡岩」及び「白谷沢のゴルジュ地形」を文化財指定**
  
  **令和8年3月25日：光るトラック型防犯ブザー寄贈式を実施**
  一般社団法人埼玉県トラック協会から飯能市への寄贈式が行われます。
  
  **令和8年3月23日：大東建託株式会社から企業版ふるさと納税による寄附を受付**
  
  **令和8年3月23日：飯能市と株式会社富士薬品が包括連携協定を締結**
  
  **令和8年3月19日：パンダ鉛筆寄贈式を実施**
  株式会社金子組から飯能市への寄贈式が行われます。
  
  **令和8年3月13日：消防団等の地域活動表彰**
  令和7年度消防団等地域活動表彰受賞者が決定しました。
  
  **令和8年2月26日：交通安全用品寄贈式を実施**
  いるま野農業協同組合から横断旗及び交通安全雨傘の寄贈式が行われます。
  
  **令和8年2月24日：飯能市と日本生命保険相互会社川越支社が包括連携協定を締結**
  
  **令和8年2月17日：緊急財政対策について公表**
  
  **令和8年2月3日：衆議院議員総選挙で投票用紙の二重交付発生**
  
  **令和8年1月23日：第51回衆議院議員総選挙・最高裁判所裁判官国民審査のお知らせ**
  
  **令和8年1月16日：第一生命保険株式会社から企業版ふるさと納税による寄附を受付**
  
  **令和7年12月23日：緊急財政対策に係る説明会を開催**
  
  **令和7年12月19日：鳥獣被害対策講習会を開催**
  
  **令和7年12月16日：第12次飯能市緊急経済対策について公表**
  
  **令和7年11月20日：日本生命保険相互会社から企業版ふるさと納税による寄附を受付**
  
  **令和7年11月19日：浅間保育所の民営化に向けたサウンディング型市場調査を実施**
  
  **令和7年11月7日：駿河台大学との協働により博物館PR動画を制作**
  
  **令和7年10月17日：保育・教育施設における給付費等の不正受給で行政処分を実施**
  
  **令和7年10月8日：特別展「レアなおふだ」を開催**
  古くて珍しいおふだを展示します。
  
  **令和7年9月30日：副市長及び教育長の再任について**
  
  **令和7年9月22日：第28回飯能市小・中学校社会科研究展の受賞作品が決定**
  
  **令和7年8月22日：後期高齢者医療保険料の特別徴収で徴収漏れが判明**
  
  **令和7年8月6日：新生児への「西川材のつみき」贈呈式を実施**
  
  **令和7年8月1日：新しい飯能市長
  
