  **令和8年1月16日** 第一生命保険株式会社が企業版ふるさと納税により寄附
  
  **令和7年12月23日** 緊急財政対策に係る説明会を開催
  
  **令和7年12月19日** 鳥獣被害対策講習会を実施
  
