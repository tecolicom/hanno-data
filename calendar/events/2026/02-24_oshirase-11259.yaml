description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  令和8年2月21日（土曜日）10時～15時、**飯能市市民会館・飯能中央公園**で飯能市生涯学習フェスティバルを開催しました。市民の学習活動の実践・発表・交流の場、および新たに生涯学習に取り組む市民へのPRの場として実施し、こどもから大人まで多くの来場者が訪れました。
  
  講座では「超入門 楽しく学ぶ低山ハイク！！天覧山から飯能の山々」「大人もこどもも一緒に学ぼう！お金のはなし」を実施。体験ブースは大ホールホワイエで脳トレゲーム・ヒノキのぶんぶんゴマ・マグネット、小ホールでお囃子体験と郷土芸能保存会による模擬演奏、小ホールホワイエで博物館展示案内・里親制度普及啓発の展示、地下展示室で囲碁体験・スライムづくき、飯能中央公園でホッケー体験・モルック体験を実施しました。飲食販売も行われました。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kyoikubu/syogaigakusyu-sports/shogaigakushu/11259.html

