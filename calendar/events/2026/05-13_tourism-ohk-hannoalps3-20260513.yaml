      Hanno Eco-Tourism Association: https://hanno-tourism.jp/hanno-eco/tour/ohk-hannoalps3/

      This tour has been closed to new registrations due to organizer circumstances.

      This tour traverses the spine of the so-called Hanno Alps, which runs from Mount Izu to Mount Tenranzan, across four separate sections. Part 3 takes you from Agano Station through representative peaks of the Hanno Alps—Maeita, Odaka, and Tengaku mountains. Lunch will be a special boxed meal from Taira Chestnut Garden.

      【Fee】¥7,800 per person (guide fee, lunch, insurance)

      【Capacity】10 people

      【Guide】Akira Shimizu, certified mountain guide stage II, Japan Mountain Guides Association

