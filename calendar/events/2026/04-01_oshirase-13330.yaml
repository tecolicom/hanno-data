description: |-
  本市では、国の物価高騰対応重点支援地方創生臨時交付金を活用し、緊急経済対策に取り組んでいます。エネルギー・食品価格等の物価高騰が続く中、物価高騰等の影響を受けた生活者や事業者に対し、当該交付金を活用した第12次飯能市緊急経済対策を実施いたします。
  
