  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-yamanesyuzo-kontyuu/
  
  飯能市内に生息する昆虫の生息環境に触れることで、飯能の自然の豊かさと生物多様性を感じていただくエコツアーです。飛来する昆虫たちの生態についても参加者の皆様と一緒に考えます。事前リクエストがあった日に開催します。
  
