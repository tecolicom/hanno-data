  ## 東飯能駅「新オブジェ」お披露目セレモニーを開催しました！
  
  令和8年3月7日(土曜日）に、「ムーミンに会えるまち、はんのう」プロジェクト推進協議会（飯能市・株式会社ムーミン物語・西武鉄道株式会社・飯能商工会議所・一般社団法人奥むさし飯能観光協会）の事業として、東飯能駅「新オブジェ」お披露目セレモニーを開催いたしました。
  
  飯能駅への設置に続き、第2弾として「ムーミンママ」のオブジェを設置いたしました。このオブジェの設置により、飯能エリアの玄関口である飯能駅・東飯能駅がムーミンで結ばれることは、まちなか回遊の新たな軸として、駅を起点とした「歩きたくなるまちづくり」をさらに加速させ、中心市街地の賑わい創出や市内全域の活性化につなげるとともに、地域住民のシビックプライドや飯能エリア来訪者の高揚感の醸成につなげてまいります。
  
  飯能駅「新オブジェ」お披露目セレモニーについて
  
  開催日
  
  3月7日（土曜日）
  
  開催場所
  
  東飯能駅 自由通路
  
  出席者
  
  飯能市 飯能市長 新井 重治
  
  株式会社ムーミン物語 代表取締役社長 望月 潔
  
  西武鉄道株式会社 常務執行役員
  
  沿線価値創造本部長兼事業創造部長 鈴木 昌勝
  
  飯能商工会議所 副会頭 鈴木 康弘
  
  一般社団法人奥むさし飯能観光協会 副会長 森田 美明
  
  東日本旅客鉄道株式会社 拝島営業統括センター副長 土屋 優
  
  株式会社丸広百貨店 飯能店長 難波 孝信
  
  ムーミントロール・ムーミンパパ
  
  Nicot 飯能 園児 10名
  
  飯能市長によるコメント
  
  飯能市長 新井 重治
  
  この度、「ムーミンに会えるまち、はんのう」プロジェクト推進協議会の事業として、本市の玄関口である東飯能駅に、市内2体目となる「ムーミンママのオブジェ」を設置できましたことを、大変嬉しく思います。すでに設置されている飯能駅のオブジェとあわせ、二つの玄関口がムーミンで結ばれることは、まちなか回遊の新たな軸となるものと期待しております。今後は、駅を起点とした「歩きたくなるまちづくり」をさらに加速させ、中心市街地の賑わい創出や市内全域の活性化につなげてまいります。
  
  「ムーミンに会えるまち、はんのう」プロジェクト推進協議会では、今後も回遊性向上や賑わい創出に向けたさまざまな施策を展開し、「まちなかの活性化、賑わいの復活」に向けて取り組んでまいります。
  
  ぜひ多くの皆さまに飯能市へお越しいただき、ムーミンとともにまち歩きを楽しんでいただければ幸いです。
  
  関連リンク
  
  「ムーミンに会えるまち、はんのう」プロジェクト推進協議会 東飯能駅にムーミンママオブジェを設置し、お披露目セレモニーを実施しました！
  
