description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  市有地6筆（山手町内）を一般競争入札で売却します。
  
  **売却物件：**山手町211番1・211番3・211番4・1406番3・1407番4・1410番2（畑3筆、宅地3筆、合計地積843.98㎡）
  
  **最低売却価格：** 6筆合計 **68,000,000円**
  
  **入札保証金：** 10,200,000円
  
  **用途地域：** 第一種住居地域
  
  **入札申込期間：** 令和8年5月22日（金曜日）～令和8年6月5日（金曜日）午前9時～午後4時30分
  
  **入札日時：** 令和8年6月19日（金曜日）午後2時
  
  **入札会場：** 飯能市役所本庁舎2階 入札室
  
  申込書類は一般競争入札案内をご参照ください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/shisankeieika/7334.html

