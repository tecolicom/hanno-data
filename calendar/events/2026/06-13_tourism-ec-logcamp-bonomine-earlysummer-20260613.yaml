      RECRUITMENT FOR THIS TOUR HAS BEEN CLOSED due to organizer circumstances.

      This tour teaches the fundamentals of streamside walking along the beautiful Shiratani Creek gorge route, aiming for the summit of Bō-no-mine. Participants enjoy lunch at a game meat restaurant and a dinner featuring local game (gibier), with instruction on the preparation and culture of game meats.

      【Participation Fee】¥23,000 per person (includes guide fee, boxed lunch and dinner, insurance)

      【Capacity】5 participants

      【Guide】Takeshi Shinohara, member of Japan Mountain Guide Association, Mountain Guide Stage Ⅲ

      【What to bring】20-liter backpack (with waterproof protection), full stream-trekking gear, change of clothes, helmet, harness, mountaineering equipment, bus fare, bathing fee, train fare
