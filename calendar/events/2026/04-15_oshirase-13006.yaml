description: |-
  飯能市ではインターネットを利用した各種オンラインサービスを提供しています。
  
  **電子申請・届出サービス**では、飯能市役所の窓口で行っている申請や届出の一部が**24時間365日**いつでも利用でき、カテゴリーやキーワードから手続を検索できます。また**マイナポータル**を通じた電子申請も可能です。
  
  **公共施設予約システム**で利用予約や空き状況確認ができるほか、**証明書等コンビニ交付サービス**ではマイナンバーカードを使ってコンビニで住民票などが取得でき、平日・休日問わず早朝・夜間でも利用できます。
  
  その他、飯能市GIS（地理情報システム）では都市計画情報やハザードマップを自宅から閲覧でき、**メール配信サービス**ではお知らせやイベント情報が配信されます。
  
  **道路損傷は24時間受付**で、緊急ダイヤル（＃9910）またはLINE、電子申請システムで通報できます。転入や結婚などの手続は**手続きナビ**でガイドされ、市民課窓口の混雑状況は**「ネコの目ドットコム」**で確認できます。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/johosystem/13006.html

