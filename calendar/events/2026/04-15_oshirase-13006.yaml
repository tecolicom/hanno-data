description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市役所の手続や情報がオンラインで利用できるサービスをまとめたページです。
  
  **電子申請・届出サービス**では、24時間365日インターネットから申請や届出が可能。**マイナポータル**を使った手続き、**公共施設予約システム**で利用予約や抽選申込ができます。
  
  便利なサービスとして、マイナンバーカードでコンビニから証明書を取得できる**証明書等コンビニ交付サービス**、都市計画情報やハザードマップが閲覧できる**飯能市GIS**、市からのお知らせやイベント情報を受け取れる**メール配信サービス**があります。
  
  道路の損傷は24時間**道路緊急ダイヤル（＃9910）**またはLINEアプリで通報可能。**手続きナビ**で転入や結婚など、シーンに応じた必要手続をご案内します。
  
  市民課窓口の混雑状況は**「ネコの目ドットコム」**で確認でき、呼出通知も受け取れます。2024年度のオンライン手続利用は291件、総手続件数87,168件です。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/johosystem/13006.html

