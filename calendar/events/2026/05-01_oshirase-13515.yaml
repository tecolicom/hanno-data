summary: "ℹ️ 水道メーターの盗難にご注意ください"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/jogesuidobu/suidogyomuka/13515.html"
dtstart: "2026-05-01"
dtend: "2026-05-01"
description: |-
  水道メーターの盗難が全国的に多発しています。飯能市では集合住宅や空き家、工事現場などで被害が起こりやすい傾向があります。メーターは市から使用者への貸与品のため、**定期的にメーターボックスを確認し、漏水の有無をチェック**してください。盗難を発見した場合や不審な行動を見かけた場合は、**警察または水道業務課（電話：042-973-2111）**へご連絡ください。なお、水道メーターの検針は「第一環境株式会社」が実施し、交換作業は飯能市水道事業協同組合に加盟する市内水道工事店が実施します。いずれも市が発行した身分証明書または腕章を携帯していますので、不審に思われたら提示をお求めください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/jogesuidobu/suidogyomuka/13515.html

