description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  水道メーターの盗難が全国的に多発しており、飯能市でも被害が予想されます。メーターは市から使用者への貸与物のため、適切な管理をお願いします。
  
  **盗難が起こりやすい場所：集合住宅、空き家、更地、新築住宅などの工事現場**
  
  盗難を発見したり、メーターボックス周辺で不審な行動を見かけた場合は、**警察または水道業務課（電話：042-973-2111）へご連絡ください**。
  
  市が委託した業者による検針・交換時は、制服と身分証明書（検針）や腕章（交換）を携帯しています。不審に思われた際は提示をお求めください。水道メーターの交換は法定有効期限（8年）前に実施し、対象者には約1か月前にハガキで通知します。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/jogesuidobu/suidogyomuka/13515.html

