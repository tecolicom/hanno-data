description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市食生活改善推進員協議会の会長・小島啓子氏が、令和7年度栄養関係功労者（食生活改善事業功労者）として**厚生労働大臣表彰**を受賞し、第55回埼玉県健康づくりのつどいで**食生活改善功労者感謝状**を受賞されました。小島氏は昭和61年の入会以来、生活習慣改善啓発活動に携わり、平成26年からは飯能北支部長および飯能市食改会長を務められています。
  
  40年の活動の中で「減塩」の啓発に注力してきたほか、調理講習会や子ども料理教室など食育活動の推進に尽力されてきました。一方、会員数の減少と高齢化が課題となっており、令和8年度は新たな推進員入会の工夫を進める予定です。
  
  食生活改善推進員養成講座を**令和8年度に実施**予定です。管理栄養士や保健師から栄養・健康知識を学び、修了後は推進員として登録されます。詳細は後日公開予定です。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/hokencenter/8239.html

