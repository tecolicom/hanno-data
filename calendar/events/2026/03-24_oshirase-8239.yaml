description: |-
  飯能市食生活改善推進員協議会の会長・小島啓子氏が、**令和7年度栄養関係功労者厚生労働大臣表彰**と**第55回埼玉県健康づくりのつどいでの食生活改善功労者感謝状**を受賞しました。小島氏は昭和61年の入会以来40年以上にわたり生活習慣改善啓発活動に従事し、平成26年から北支部長・会長を兼務しています。
  
  表敬訪問で、小島氏は「減塩」の啓発推進による成果と、今後さらに家庭からの実践が重要であること、また会員の高齢化と若手入会の少なさに触れ、令和8年度は新規推進員入会に向けた工夫を進める意気込みを述べられました。
  
  飯能市内では現在5支部が拠点地区行政センター等で年5回程度の調理講習会を実施し、子ども向け料理教室や市イベントでの食育活動を展開しています。**令和8年度は食生活改善推進員養成講座を実施予定**で、管理栄養士・保健師から栄養と健康の正しい知識を学び、修了後は推進員として登録されます。詳細は後日公開となります。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/hokencenter/8239.html

