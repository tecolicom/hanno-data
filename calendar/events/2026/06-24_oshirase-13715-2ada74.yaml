  🆕 新着掲載 (公開日: 2026-06-21)
  
  今年の七夕（たなばた）かざりは、きっとすで作ってみませんか？
  
  ## 日時
  
  令和8年7月5日（日曜日）
  
  午前10時00分から正午まで
  
  午後1時00分から午後3時00分まで
  
  ## 会場
  
  飯能市立博物館きっとす 学習研修室
  
  ## 参加費・申し込み
  
  無料
  
  申し込みは不要です。直接会場（飯能市立博物館）へお越しください。
  
  ## 内容
  
  七夕かざりの製作、竹の小枝への飾りつけなど
  
  作った作品はお持ち帰りいただけます。
  
