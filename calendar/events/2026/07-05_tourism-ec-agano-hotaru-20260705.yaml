    summary: "Walk through Agano Post Town and enjoy Genji fireflies and kajika frog calls by the Koma River"
    description: |-
      Automated translation (refer to source for accuracy)
      
      Hanno Eco-Tourism Association: https://hanno-tourism.jp/hanno-eco/tour/ec-agano-hotaru/
      
      Come see Genji fireflies dancing over the Koma River and listen to kajika frogs with their distinctive deer-like calls. You'll stroll through the historic streetscapes of this post town, then enjoy an organic vegetable curry inside a 160-year-old traditional house that is designated as a municipal heritage building.
      
      【Fee】
      Adults: ¥3,000
      Middle school students and younger: ¥1,500
      (Includes guide, insurance, and dinner)
      
      【Capacity】
      10 people per date
      
      【Guide】
      Yoshishige Okawara (Agano Post Town Revitalization and Agano Discussion Group)
      
      【What to bring】
      Flashlight, rain gear, water bottle, long sleeves, long pants, comfortable walking shoes
      
      【More information】
      COM Station website: https://aganojuku.jimdofree.com/
