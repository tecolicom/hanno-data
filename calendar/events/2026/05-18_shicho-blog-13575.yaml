description: |-
  5月18日（月曜日）、令和8年3月31日をもって人権擁護委員をご退任された毛利淳子様に対し、法務大臣からの感謝状がさいたま地方法務局所沢支局長 高山広治氏より贈呈されました。
  
  また、4月1日付で新たに人権擁護委員に委嘱された大野美智子様への委嘱状の授与を執り行いました。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202605/13575.html

