description: |-
  2月27日（金曜日）、令和8年第1回飯能市議会定例会が開会されました。
  
  会期は2月27日から3月25日までで、専決処分の承認を求めることについて、条例案、補正予算案、当初予算案など計39件の議案についてご審議いただく予定です。
  
