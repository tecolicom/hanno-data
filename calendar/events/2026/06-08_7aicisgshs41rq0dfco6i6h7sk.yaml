description: |-
  ## v1.41.0
  
  バスの停留所選択を、最近選んだ停留所からすぐ選べるようにしました。
  
  - 🚏 乗る・降りる停留所を「最近選んだ停留所」からすぐ選べる履歴メニューに — 乗車・降車どちらの画面も、よく使う停留所からワンタップで選べます
  - よく使う停留所を鍵マークでロックして固定 — ロックした停留所は履歴から消えず残ります（最大 5 件）
  - 行き先（方面）を選びやすく・大きく — 路線をはさまず方面を直接選べるよう整理し、停留所名・方面・時刻の文字を大きく見やすくしました

