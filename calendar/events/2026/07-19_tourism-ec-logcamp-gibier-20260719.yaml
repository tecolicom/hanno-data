description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-logcamp-gibier/
  
  飯能産の捕獲した鹿の解体から、ジビエ料理を食べるところまでの体験ツアーです。山間地域の課題である獣害対策の中でいただく山の恵みを感謝しながらいただきます。解体施設ムジカを見学し、鳥獣被害対策の現状を学び、ジビエレストラン・ログキャンプで、美味しいジビエを味わいます。
  
  【利用料金】一人7,500円 （ガイド料、食事代、保険代）
  
  【定員】8名
  
  【ガイド】佐藤 好則（特定非営利活動法人 crew-L）
  
  【持ち物】電車代、軍手、汚れてもいい服、歩きやすい靴

