description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  令和6年度の飯能市財務書類を公表しました。統一的な基準による財務書類は、従来の現金主義会計に加えて、社会資本（資産）や地方債（負債）などのストック情報を明確にするもので、平成28年度決算から作成・公表しています。今年度は**概要版、一般会計等財務書類、全体財務書類、連結財務書類、固定資産台帳**の各種資料を公開しており、市の財政状況をより総合的に把握できます。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/zaiseika/zaimushohyo/13351.html

