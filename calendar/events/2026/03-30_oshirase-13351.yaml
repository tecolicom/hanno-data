description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  令和6年度財務書類を公表します。飯能市では平成28年度決算から、従来の現金主義会計に加えて、統一的な基準による財務書類を作成・公表しています。この方式により、社会資本などの資産や地方債などの負債といったストック情報がより明確に把握できます。
  
  【公表資料】
  ・財務書類概要版
  ・一般会計等財務書類（附属明細書、注記含む）
  ・市全体財務書類（附属明細書、注記含む）
  ・連結財務書類（附属明細書、注記含む）
  ・固定資産台帳
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/zaiseika/zaimushohyo/13351.html

