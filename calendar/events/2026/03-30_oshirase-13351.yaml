description: |-
  飯能市が平成28年度決算から作成・公表している**統一的な基準による令和6年度財務書類**を公開しました。現金主義会計では把握しにくい社会資本などのストック情報を明確にするため、総務省の「統一的な基準による地方公会計マニュアル」に基づいています。公開資料は、概要版、一般会計等財務書類、全体財務書類、連結財務書類、固定資産台帳など複数の書類から構成されています。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/zaiseika/zaimushohyo/13351.html

