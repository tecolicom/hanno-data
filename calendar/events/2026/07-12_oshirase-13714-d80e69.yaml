  飯能市緊急財政対策により休止していた観光公衆トイレ7か所を再開いたします。
  
  【再開日程】
  ・竹寺観光公衆トイレ（大字南704番地）：7月1日再開
  ・竹寺入口観光公衆トイレ（大字南750番地1）：7月1日再開
  ・阿寺諏訪神社観光公衆トイレ（大字長沢1843番地）：7月1日再開
  ・小沢観光公衆トイレ（大字下名栗1128番地1）：7月1日再開
  ・河又観光公衆トイレ（大字下名栗558番地1）：7月1日再開
  ・中居観光公衆トイレ（大字中居219番地）：再開準備中
  ・飯能観光案内所観光公衆トイレ（大字飯能1051番地8）：再開準備中
  
  再開時期については随時更新いたします。
  
