description: |-
  3月26日（木曜日）、株式会社金子組様からパンダ鉛筆500ダースを寄贈していただきました。
  
  パンダ鉛筆を販売する一般社団法人埼玉県筋ジストロフィー協会様は、筋ジストロフィー症の撲滅を願うとともに、患者及びそのご家族の方への支援と福祉の増進に寄与することを目的として設立された福祉団体です。パンダ鉛筆の売上げは患者様及びそのご家族の方の支援活動等に役立てられるとのことです。
  
  今回寄贈していただいたパンダ鉛筆につきましては、令和8年度に飯能市立小学校に入学する新1年生児童へ配布し、学習に活用させていただきます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202603/13356.html

