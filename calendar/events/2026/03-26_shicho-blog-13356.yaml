summary: "📝 市長：株式会社金子組様 パンダ鉛筆寄贈式"
url: "https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202603/13356.html"
dtstart: "2026-03-26"
