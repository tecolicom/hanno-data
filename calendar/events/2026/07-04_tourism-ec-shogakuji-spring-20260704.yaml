description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-shogakuji-spring/
  
  飯能の自然の中、川の音、風の音、鳥たちのさえずりを聞きながらの曹洞宗認可参禅道場の正覚寺での坐禅を中心とした修行体験です。昼食は修行僧が本山で使用する応量器で動物性の食材を一切使用しない精進料理を召し上がっていただきます。また、一文字一文字心を込めて般若心経を写していただく写経も体験していただきます。
  
  【利用料金】一人7,000円 （ガイド、昼食、写経、保険）
  
  【定員】20名
  
  【ガイド】石井早苗（正覚寺）
  
  【持ち物】タオル、坐禅がしやすい長ズボンを着用、もしくは持参

