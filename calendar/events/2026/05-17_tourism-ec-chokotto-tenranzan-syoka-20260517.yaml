      Hanno Eco-Tourism Association: https://hanno-tourism.jp/hanno-eco/tour/ec-chokotto-tenranzan-syoka/

      Would you like to discover the natural changes you normally miss on an everyday walk? Join a guide and explore together. This tour is designed to be quick and easy to enjoy. Please feel welcome to participate. Depending on the season, you may receive homemade pesticide-free vegetables as a gift!

      【Fees】
      ¥2,000 per person, ¥1,500 for repeat visitors, ¥4,000 per family (includes guide and insurance)

      【Capacity】
      10 people

      【Guide】
      Kojima Tsubasa (Hanno City Eco-Tourism Citizen Guide Association, Wildlife Group)

      【What to bring】
      Drink, rain gear, backpack or similar (something that leaves your hands free is recommended), towel
