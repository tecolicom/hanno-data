description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  訪問看護ステーション「ほほえみ」は、**埼玉県飯能市虎秀25-1（東吾野医療介護センター内）**に位置する在宅療養支援施設です。平成12年開設、医療現場経験者の看護師が多く所属しています。
  
  **訪問日時：月曜日～金曜日、午前8時30分～午後5時15分**（土日祝・年末年始12月29日～1月3日休休）
  
  **サービス内容**：かかりつけの医師の指示に基づき、病状観察、床ずれ予防・処置、リハビリテーション、チューブ管理、入浴・食事・排泄介助、認知症・精神疾患患者の看護、医療処置など。訪問回数は原則週3回（状態により異なります）。
  
  **対象者**：寝たきりの方、リハビリが必要な方、医療処置が必要な方、難病・がん末期・認知症・精神疾患で在宅療養を望む方など。
  
  **利用料**：介護保険対象者は介護報酬に基づき、自己負担割合により異なります。医療保険対象者は年齢や保険資格により費用が変わります。交通費は実費の場合あり。詳細は**電話 042-978-1922**。
  
  マイナンバーカード（マイナ保険証）または健康保険証持参でスムーズな利用が可能です。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/iryo/2431.html

