description: |-
  訪問看護ステーション ほほえみは、平成12年開設、東吾野医療介護センター内に事務所がある訪問看護事業所です。医療現場経験のある看護師が多く所属し、医療機関との連携が充実しています。
  
  **所在地：埋玉県飯能市虎秀25‐1（東吾野医療介護センター内地階）**
  **電話：042‐978‐1922**
  
  **訪問日時：月曜日～金曜日、午前8時30分～午後5時15分**
  **訪問回数：原則週3回まで（状態により異なります）**
  
  かかりつけ医師の指示に基づき、病状観察、褥瘡予防・処置、リハビリテーション、チューブ・カテーテル管理、入浴・排泄介助、認知症・精神疾患患者の看護、医療処置など、在宅療養を支援します。
  
  **対象：寝たきりの方、リハビリ必要な方、医療処置が必要な方、難病・がん末期・認知症・精神疾患で在宅療養を望む方**
  
  **利用料：介護保険対象者は看護師20分未満328～3割982円等。医療保険対象者は40歳未満、40～65歳の16特定疾病の方、65歳以上で要支援・要介護非認定の方。医療保険自己負担は小学校入学前2割、入学後～69歳3割、70～74歳2～3割、75歳～1～3割。交通費は実費の場合あり。**
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/iryo/2431.html

