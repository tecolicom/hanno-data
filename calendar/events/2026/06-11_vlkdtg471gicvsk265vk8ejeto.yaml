description: |-
  ## v1.44.1
  
  画面下のアイコンだけで友だち登録ができるようになりました。
  
  - 友だち追加アイコンで招待 QR をその場に表示 — 片方が友だち追加アイコン、もう片方がカメラアイコン。ふたつ並んだボタンだけで推し友になれます
  - 招待を URL で送るときに有効期限の日時を明記 — 「2026-06-11 21:45:42 まで」の形式で相手に伝わります
  - ポップアップの背景が灰色になっていたのを修正
  
  ## v1.44.0
  
  Myはんのうをひろめる「シェア＆コネクト」セクションを刷新しました。
  
  - 📱 QR コードをタップすると大きく表示 — そのまま URL もコピーできます
  - サービスメニューに「🍻 友だちとつながる」を追加 — 推し友機能に直接アクセスできます
  - フッターリンクの折り返しを修正

