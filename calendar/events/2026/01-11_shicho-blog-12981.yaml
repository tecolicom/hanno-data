description: |-
  1月11日（日曜日）、飯能市市民会館にて令和8年飯能市成人式～二十歳の祝い～を開催いたしました。
  
  今年度、本市で20歳を迎えられる方の人数は742名で、式典には467名の方が出席されました。
  
  人生の大きな節目を迎えられました20歳の皆様、ご家族の皆様、誠におめでとうございます。
  
  これからの人生が素晴らしいものになりますことを心よりご祈念申し上げます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202601/12981.html

