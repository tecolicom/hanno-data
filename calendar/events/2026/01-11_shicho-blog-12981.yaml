    summary: "📝 Mayor: Hanno City Coming-of-Age Ceremony 2026 ~ Celebration of Turning Twenty"
    description: |-
      Automated translation (refer to source for accuracy)

      On Sunday, January 11, 2026 (Reiwa 8), we held the Hanno City Coming-of-Age Ceremony ~ Celebration of Turning Twenty ~ at Hanno Civic Hall.

      This year, 742 people in our city are turning twenty, and 467 of them attended the ceremony.

      Congratulations to all of you who are reaching this major milestone in life, and to your families.

      I sincerely wish that your futures will be filled with wonderful moments and achievements.

