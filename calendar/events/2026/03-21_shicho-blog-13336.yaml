  3月21日（土曜日）、飯能ライオンズクラブ桜並木 ぼんぼり点灯式にお招きいただき参加してまいりました。この点灯式は飯能ライオンズクラブ桜並木が市民の皆様から桜の名所と親しまれるよう、実施されています。
  
