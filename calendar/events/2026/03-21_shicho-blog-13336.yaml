description: |-
  3月21日（土曜日）、飯能ライオンズクラブ桜並木 ぼんぼり点灯式にお招きいただき参加してまいりました。この点灯式は飯能ライオンズクラブ桜並木が市民の皆様から桜の名所と親しまれるよう、実施されています。
  
  点灯式開催にあたり、ご尽力いただきました関係者の方々に感謝申し上げます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202603/13336.html

