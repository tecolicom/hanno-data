    description: |-
      Automated translation (refer to source for accuracy)

      Hanno Ecotourism Association: https://hanno-tourism.jp/hanno-eco/tour/ec-logcamp-bonomine-earlysummer/

      【RECRUITMENT SUSPENDED】 This tour has been suspended due to organiser circumstances.

      This tour takes you stream hiking on the scenic Shiratani Gorge route with basic gorge formations to reach the summit of Bonomine. You'll learn the fundamentals of stream walking and enjoy the natural gorge landscape. Lunch and dinner feature wild game restaurant cuisine—a special bento box lunch and a full dinner—where you'll also learn about wild game (gibier).

      【Fee】 ¥23,000 per person (includes guide, lunch and dinner, insurance)

      【Capacity】 5 people

      【Guide】 Takeshi Shinohara, Japan Mountain Guides Association member, mountaineering guide stage III

      【What to bring】 20-litre backpack (with full waterproof protection), complete stream walking gear, change of clothes, helmet, harness, mountaineering equipment, bus fare, bathing fee, train fare
