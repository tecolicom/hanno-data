description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-morimana-metsa-kontyu/
  
  昆虫の生態を観察したり、外来種や危険性物などの標本を作る体験をしながら、昆虫の体のしくみや動植物の生態など楽しく学ぶことができるツアーです。ツアーに参加して虫博士になれば夏休みがもっと楽しくなるかも!?
  
  【利用料金】大人5,000円、学生4,000円、未就学児2,500円 （ガイド料、保険、材料費等）
  
  【定員】15名
  
  【ガイド】森のフィールド学舎スタッフ
  
  【持ち物】飲み物、昼食、軍手、筆記用具、雨具、虫よけスプレー
  
  【備考】森のフィールド学舎HP https://morinomanabiya168.wixsite.com/website

