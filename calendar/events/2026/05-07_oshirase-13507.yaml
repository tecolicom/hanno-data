description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  埼玉県が視覚に障がいのある方向けに、ハザードマップの情報を音声で提供するサービス「耳で聴くハザードマップ」を開始します。
  
  **利用開始日：令和8年5月1日(金曜日)**
  
  **主な機能：**
  - 現在地や自宅などの標高・災害リスク（洪水の浸水深さ・水位低下時間等）の音声読み上げ
  - 最寄りの避難場所まで音声・振動で誘導
  - 気象庁の警報・注意報の音声読み上げ
  
  **利用方法：** 無料アプリ「Uni-Voice Blind」をインストール。災害リスクや避難場所を事前に確認でき、円滑な避難行動につながります。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/somubu/bosaikikikanri/5/13507.html

