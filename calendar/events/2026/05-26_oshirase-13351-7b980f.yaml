  ## 令和6年度財務書類(統一的な基準)
  
  現在の地方公共団体の会計は、単年度における現金の収支を管理する「現金主義会計」が採用されており、決算書もこれに基づいて作成されています。この現金主義会計では、これまでに整備した社会資本（資産）の状況や今後返済すべき地方債等（負債）の残高など、ストック情報がわかりにくいという側面があったことから、平成27年1月に総務省から「統一的な基準による地方公会計マニュアル」が示され、飯能市では平成28年度決算から統一的な基準による財務書類を作成、公表しています。
  
