  【中止】「人権擁護委員の日」特設人権相談所（6月3日）について、台風第6号の接近に伴い、6月3日（水曜日）の開催を中止いたします。
  
  当初の開催予定は以下の通りでした：
  日時：6月3日（水曜日）10時～15時
  会場：飯能中央地区行政センター
  相談員：人権擁護委員
  
  セクハラやパワハラ、家庭内暴力、体罰やいじめ、インターネットでの誹謗中傷、差別など、人権に関する相談に応じる特設相談所で、相談は無料です。
  
  ご利用を予定されていた皆様にはご不便をおかけしますが、ご理解くださいますようお願いいたします。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/shiminseikatsubu/jinkenkurashianzen/11548.html

