summary: "ℹ️ 飯能市立図書館「新オブジェ」お披露目セレモニー"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/kikakuka/sangakukanrenkei/13477.html"
dtstart: "2026-04-23"
dtend: "2026-04-23"
description: |-
  飯能市立図書館に「ムーミンパパ」のオブジェを設置するお披露目セレモニーを、**令和8年4月23日(木曜日)** に開催いたしました。飯能駅・東飯能駅に続く第3弾のオブジェ設置により、まちなか回遊の新たな軸として「歩きたくなるまちづくり」をさらに推進し、中心市街地の賑わい創出と市内全域の活性化につなげます。セレモニーでは、株式会社ムーミン物語からムーミンの仕掛け絵本『ムーミン谷へのながいたび』、西武鉄道株式会社から西武鉄道車両のプラレールをご寄贈いただき、図書館で活用させていただきます。セレモニーには市長をはじめ関係機関の代表者や山手保育所の園児32名が参加いたしました。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/kikakuka/sangakukanrenkei/13477.html

