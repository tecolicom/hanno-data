description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  令和8年4月23日(木曜日)、飯能市立図書館で「ムーミンパパ」のオブジェお披露目セレモニーを開催いたしました。飯能駅・東飯能駅に続く第3弾として、図書館にムーミンオブジェを設置することで、まちなか回遊の新たな軸を形成し、「歩きたくなるまちづくり」を推進します。
  
  セレモニーでは、株式会社ムーミン物語からムーミンの仕掛け絵本『ムーミン谷へのながいたび』、西武鉄道株式会社から西武鉄道車両のプラレールが寄贈されました。これらは図書館で展示・活用し、図書館の魅力向上と中心市街地の賑わい創出、市内全域の活性化につなげていきます。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/kikakuka/sangakukanrenkei/13477.html

