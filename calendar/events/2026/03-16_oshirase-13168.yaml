summary: "ℹ️ 有間エリア水源林保全プロジェクト （通称「クマタカとヤマネの森プロジェクト」）"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/kankyokeizaibu/shinrinzukurika/13168.html"
dtstart: "2026-03-16"
dtend: "2026-03-16"
description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市の有間エリア（奥山の市有林約1,300ha）で、手入れ不足のスギ・ヒノキ人工林を針広混交林化し、天然林への復元を目指すプロジェクトが始まります。**令和7(2025)年度から実証的にスタート**しており、水源涵養や災害防止、生物多様性の向上を目的としています。
  
  間伐などの森林整備のほか、エコツアーやモニタリング、順応的管理にも取り組みます。**シンボル種は絶滅危惧種のクマタカと、国指定天然記念物のヤマネ**。施業時には、クマタカの営巣期や狩り場、ヤマネが利用する種子・果実・コケ類など、これら生物の生息・生育環境に配慮します。目指す姿は、2030年頃の、豊かな森林生態系が保たれた環境です。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kankyokeizaibu/shinrinzukurika/13168.html

