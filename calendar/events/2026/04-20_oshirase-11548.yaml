summary: "ℹ️ 「人権擁護委員の日」特設人権相談所を開設します"
url: "https://www.city.hanno.lg.jp/soshikikarasagasu/shiminseikatsubu/jinkenkurashianzen/11548.html"
dtstart: "2026-04-20"
