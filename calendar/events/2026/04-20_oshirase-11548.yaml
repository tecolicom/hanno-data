description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  6月3日(水曜日)10時～15時、飯能中央地区行政センターで「人権擁護委員の日」特設人権相談所を開設します。セクハラ、パワハラ、家庭内暴力、体罰、いじめ、インターネット誹謗中傷、差別など、人権侵害に関する相談に応じます。**相談は無料で、人権擁護委員が対応します**。一人で悩まず、気軽にご相談ください。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/shiminseikatsubu/jinkenkurashianzen/11548.html

