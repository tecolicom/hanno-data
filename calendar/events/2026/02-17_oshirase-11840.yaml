description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市は令和8年2月現在、市長を本部長とする緊急財政対策本部会議を9回開催し、持続可能な行財政運営の確立に向けた取組を進めています。
  
  **緊急財政対策プランの目標は、令和8年度末までに財政調整金及び減債基金の合計残高を標準財政規模の10％（19.5億円）以上確保すること、および歳入に見合った歳出への転換を図ることです。**
  
  令和7年6月に「飯能市緊急財政対策プラン」を策定・公表。全ての事務事業を聖域なく見直し、受益者負担の見直しや事業の規模縮小・休止・廃止などを段階的に実施しています。事務事業見直し検討シートは複数回の公表を経て、令和8年度予算案と整合させた「確定版」を**2月17日から公表**しています。
  
  これまでの経過として、令和7年4月から検討を開始し、6月に緊急財政対策プランを策定、7月以降は使用料・手数料の見直しや窓口開庁時間の短縮検討、令和8年度当初予算案の編成を進めてきました。令和8年1月には市長給与や職員人件費の削減、地方交付税増加を見込み、財政調整基金に頼らない予算編成見込みが成立しています。
  
  **今後は令和8年3月定例会で令和8年度当初予算案を提出予定です。**
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/zaiseika/kinkyuuzaiseitaisaku/11840.html

