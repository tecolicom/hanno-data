description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  浅間保育所の建替えに伴う民営化について、サウンディング型市場調査を実施しました。民間事業者による施設整備及び施設運営に関するご意見・ご提案を伺うもので、**エントリーシート提出期間は令和7年11月19日（水曜日）から令和7年12月5日（金曜日）まで**、**事前質問受付期間も同期間**です。詳細は実施要領、様式集、事前質問に対する回答を確認してください。実施結果は令和8年2月18日に公表されました。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kodomoshienbu/kodomoseisakuka/12596.html

