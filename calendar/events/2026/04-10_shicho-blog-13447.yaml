description: |-
  4月10日（金曜日）、埼玉県市長会定期総会に出席しました。埼玉県市長会は県内全40市の市長で組織され、県下各都市間の連絡協調を図り、市政の円滑なる運営と進展に資し、もって地方自治の興隆繁栄に寄与することを目的としたものです。
  
  今回の総会では、地方一般財源総額の確保・充実及び財源の偏在是正に関する決議をし、国に要望を行うこととするなどしました。
  
  今後とも連携、協力して住みやすい地域づくり、まちづくりに向けて取り組んでまいります。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13447.html

