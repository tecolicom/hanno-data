description: |-
  2月7日（土曜日）、阿須運動公園ホッケー場にて開催された県下6人制ホッケー大会 開会式に出席してまいりました。
  
  午前中に小中学生の交流試合、午後には一般の部（高校生以上）の試合が行われました。
  
