description: |-
  飯能エコツーリズム協会: https://hanno-tourism.jp/hanno-eco/tour/ec-morimana-metsa-hotaru/
  
  日本人に馴染みのある昆虫「ホタル」の光を灯しながら飛ぶ姿は幻想的でうっとりしてしまいます。そんなホタルを観察するだけではなく、ホタルが好む環境やくらし、発光メカニズムなどを座学とフィールドでがっつり学ぶツアーです。
  
  【利用料金】大人6,000円、学生5,000円、未就学児3,000円 （ガイド料、保険、材料代など）
  
  【定員】15名
  
  【ガイド】森のフィールド学舎スタッフ
  
  【持ち物】筆記用具、飲み物、軽食、ハンドライト、虫よけ、熱中症予防対策
  
  【備考】森のフィールド学舎HP https://morinomanabiya168.wixsite.com/website

