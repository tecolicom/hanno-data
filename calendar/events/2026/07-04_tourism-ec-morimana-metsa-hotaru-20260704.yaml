  日本人に馴染みのある昆虫「ホタル」の光を灯しながら飛ぶ姿は幻想的でうっとりしてしまいます。そんなホタルを観察するだけではなく、ホタルが好む環境やくらし、発光メカニズムなどを座学とフィールドでがっつり学ぶツアーです。
  
