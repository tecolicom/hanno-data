description: |-
  2月17日（火曜日）、令和7年度飯能市60歳の集い実行委員会様からご寄附をいただきました。
  
  寄附金につきましては、未来を担う子どもたちのために、切れ目のない子育て支援など、こども施策の更なる推進を図ることへ活用させていただきます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202602/13215.html

