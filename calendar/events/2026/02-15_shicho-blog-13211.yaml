description: |-
  2月15日（日曜日）、飯能市市民会館にて、令和7年度飯能市郷土芸能フェスティバルが開催され、出席してまいりました。
  
  本フェスティバルは郷土芸能の普及、伝承を目的に毎年市内外の各団体が演技を披露しており、今回45回目の開催を迎えました。
  
  今年は東京都指定無形民俗文化財の「相模流里神楽 五世萩原由郎社中 萩梅会」、越生町の「武蔵越生高等学校和太鼓部 青龍」、本市の「前田囃子保存会」が出演されました。
  
  日頃から郷土芸能の普及・継承にご尽力いただいている皆様に心から感謝を申し上げますとともに、本公演の開催にあたりご尽力いただきました飯能市郷土芸能保存会の皆様に心からお礼を申し上げます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202602/13211.html

