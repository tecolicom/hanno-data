description: |-
  フレイル（加齢に伴う筋力・認知機能・社会参加の低下）予防を目的とした、運動・栄養・口腔・認知症予防の4つの講座を開催します。
  
  **開催地区・日程・申込先：**
  
  **◆原市場福祉センター**（時間：14時～15時）
  - 令和8年5月13日(水)認知症予防講座
  - 令和8年5月27日(水)口腔講座
  - 令和8年6月10日(水)栄養講座
  - 令和8年6月24日(水)運動講座
  - **申込先：地域包括支援センターいなり町 042-980-5043**
  
  **◆東吾野地区行政センター**（時間：10時～11時）
  - 令和8年6月11日(木)認知症予防講座
  - 令和8年9月10日(木)口腔講座
  - 令和8年10月8日(木)栄養講座
  - 令和9年2月25日(木)運動講座
  - **申込先：地域包括支援センターはちまん町 042-975-3011**
  
  **◆双柳地区行政センター**（時間：10時～11時）
  - 令和8年10月9日(金)認知症予防講座
  - 令和8年11月6日(金)栄養講座
  - 令和8年12月11日(金)口腔講座
  - 令和9年2月12日(金)運動講座
  - **申込先：地域包括支援センターさかえ町 042-971-3172**
  
  **◆加治地区行政センター**（時間：14時～15時）
  - 令和8年12月9日(水)認知症予防講座
  - 令和8年12月23日(水)運動講座
  - 令和9年1月13日(水)口腔講座
  - 令和9年1月27日(水)栄養講座
  - **申込先：地域包括支援センターみなみ町 042-978-5777**
  
  申込は各講座の**1か月前から**です。持ち物：筆記用具、飲み物、眼鏡（必要な方）、運動講座はフェイスタオルと運動しやすい服装・靴。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/kenkohukusibu/kaigofukushika/ninchi-sisaku/ninchi-jigyou/7983.html

