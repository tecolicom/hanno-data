description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  フレイル予防のための4つの講座「運動」「栄養」「口腔」「認知症予防」を、市内4か所の地区行政センター・福祉センターで開催します。
  
  **【開催会場・日程】**
  
  **原市場福祉センター**（14時～15時）
  - 令和8年5月13日(水) 認知症予防講座
  - 5月27日(水) 口腔講座
  - 6月10日(水) 栄養講座
  - 6月24日(水) 運動講座
  申込先：地域包括支援センターいなり町 042-980-5043
  
  **東吾野地区行政センター**（10時～11時）
  - 令和8年6月11日(木) 認知症予防講座
  - 9月10日(木) 口腔講座
  - 10月8日(木) 栄養講座
  - 令和9年2月25日(木) 運動講座
  申込先：地域包括支援センターはちまん町 042-975-3011
  
  **双柳地区行政センター**（10時～11時）
  - 令和8年10月9日(金) 認知症予防講座
  - 11月6日(金) 栄養講座
  - 12月11日(金) 口腔講座
  - 令和9年2月12日(金) 運動講座
  申込先：地域包括支援センターさかえ町 042-971-3172
  
  **加治地区行政センター**（14時～15時）
  - 令和8年12月9日(水) 認知症予防講座
  - 12月23日(水) 運動講座
  - 令和9年1月13日(水) 口腔講座
  - 1月27日(水) 栄養講座
  申込先：地域包括支援センターみなみ町 042-978-5777
  
  **申込は各講座の1か月前から**。持ち物：筆記用具、飲み物、眼鏡(必要な方)、運動講座はフェイスタオル・運動しやすい服装・靴。
  
