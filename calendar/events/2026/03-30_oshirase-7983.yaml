description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  みんなでピンシャン～動けるカラダプロジェクト～
  
  フレイル予防について学ぶ講座です。運動、栄養、口腔、認知症予防の4つの講座を開催します。
  
  【東吾野地区行政センター】(10時～11時)
  ・令和8年6月11日(木曜日)：認知症予防講座
  ・令和8年9月10日(木曜日)：口腔講座
  ・令和8年10月8日(木曜日)：栄養講座
  ・令和9年2月25日(木曜日)：運動講座
  申込先：地域包括支援センターはちまん町 042-975-3011
  
  【加治地区行政センター】(14時～15時)
  ・令和8年12月9日(水曜日)：認知症予防講座
  ・令和8年12月23日(水曜日)：運動講座
  ・令和9年1月13日(水曜日)：口腔講座
  ・令和9年1月27日(水曜日)：栄養講座
  申込先：地域包括支援センターみなみ町 042-978-5777
  
  【原市場福祉センター】(14時～15時)
  ・令和8年5月13日(水曜日)：認知症予防講座
  ・令和8年5月27日(水曜日)：口腔講座
  ・令和8年6月10日(水曜日)：栄養講座
  ・令和8年6月24日(水曜日)：運動講座
  申込先：地域包括支援センターいなり町 042-980-5043
  
  【双柳地区行政センター】(10時～11時)
  ・令和8年10月9日(金曜日)：認知症予防講座
  ・令和8年11月6日(金曜日)：栄養講座
  ・令和8年12月11日(金曜日)：口腔講座
  ・令和9年2月12日(金曜日)：運動講座
  申込先：地域包括支援センターさかえ町 042-971-3172
  
  【申込開始時期】各講座の1か月前から
  【持ち物】筆記用具、飲み物、眼鏡(必要な方)、運動講座はフェイスタオルと運動しやすい服装・靴
  
