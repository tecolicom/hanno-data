description: |-
  🆕 新着掲載 (公開日: 2026-07-22)
  
  令和8年8月31日（月曜日）から市役所の代表電話番号（電話番号 973-2111）の電話対応において、自動音声による案内を開始し、このことに伴い各所管課の内線番号も変わります。
  
  また、対応品質の向上のため、電話の通話録音を開始します。
  
