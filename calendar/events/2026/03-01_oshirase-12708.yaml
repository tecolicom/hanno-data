description: |-
  AI による要約 (正確な情報は元記事をご確認ください)
  
  飯能市の**緊急財政対策に至った経緯と事務事業見直しについての説明会**を開催しました。
  
  **令和8年1月開催分（終了）**
  - 1月17日（土）13時30分～15時30分、1月18日（日）9時30分～11時30分
  - 飯能市役所本庁舎別館
  
  **令和8年2月開催分（終了）**
  各地区行政センターで以下の日程で開催：
  - 2月9日（月）加治地区、2月10日（火）精明地区、2月12日（木）吾野地区、2月15日（日）飯能中央地区（手話通訳対応）、2月17日（火）南高麗地区、2月18日（水）原市場地区、2月19日（木）富士見地区（手話通訳対応）、2月22日（日）美杉台地区・名栗地区、2月24日（火）双柳地区、2月26日（木）第二区地区、2月27日（金）加治東地区、2月28日（土）東吾野地区（手話通訳対応）
  
  平日は19時～21時、日曜日は9時30分～11時30分または14時30分～16時30分。**事前申し込み不要、直接会場へ**。参加希望者が多数の場合は入場制限あり。配布資料はWebサイトからダウンロード可能。
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/sogoseisakubu/zaiseika/kinkyuuzaiseitaisaku/12708.html

