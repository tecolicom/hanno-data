description: |-
  2月8日（日曜日）、飯能市民体育館メインアリーナにて開催された「飯能ロータリークラブカップ第36回せせらぎ杯中学生卓球大会」開会式に出席してまいりました。
  
  この大会は普段の練習成果を発揮する機会として、飯能市内の中学生をはじめ、埼玉県内及び関東各地の中学生の卓球チームが集い開催されています。
  
  開催にあたり、ご尽力いただきました関係者の方々に感謝申し上げます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202602/13119.html

