description: |-
  ## 「みん活サマー2026」を一緒に盛り上げてくれる団体を募集します
  
  開催日時 令和8年8月2日（日曜日）10時30分～16時
  
  場所 市民活動センター（丸広百貨店飯能店 7階）
  
  募集内容 世代を問わず参加できるワークショップを実施できる団体
  
  応募期間 令和8年5月7日（木曜日）～22日（金曜日）まで
  
  応募方法 市民活動センターに来館の上、参加申込書にご記入ください。
  
  募集数    5団体、応募多数の場合は、抽選により決定の予定
  
  飯能市公式サイト 新着情報: https://www.city.hanno.lg.jp/soshikikarasagasu/shiminseikatsubu/jitishinkoka/shiminkatudou/11245.html

