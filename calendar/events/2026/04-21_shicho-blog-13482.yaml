description: |-
  4月21日（火曜日）、青梅信用金庫様より『あおしん“TASUKI”寄附金』をいただきました。
  
  地域の発展を担うこどもの未来のために創設されたこの寄附金制度は、寄附を通じてこども達への支援や子育て家庭への支援を図ることを目的とされ、令和5年度から毎年ご寄附をいただいております。
  
  この度のご寄附については、0歳児の赤ちゃんの保護者が育児用品等の購入に使用できる「赤ちゃんスマイルクーポン」を支給するための財源にさせていただきます。
  
  市長ブログ「市政一直線」: https://www.city.hanno.lg.jp/shiseijoho/shichoshitsu/shichoblog/shisei2026/shisei202604/13482.html

