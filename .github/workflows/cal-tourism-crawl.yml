name: hanno-tourism crawl

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 JST (= 22:00 UTC previous day)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cal-tourism-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run cal-tourism-fetch
        run: ./calendar/bin/cal-tourism-fetch --out-dir calendar/events

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain calendar/events)" ]; then
            git status --short calendar/events
            git add calendar/events
            git commit -m "calendar: tourism crawl $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no event changes"
          fi
