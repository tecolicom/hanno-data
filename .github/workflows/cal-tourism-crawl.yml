name: hanno-tourism crawl

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 JST (= 22:00 UTC previous day)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cal-tourism-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run cal-tourism-fetch
        # --min-sessions: 抽出件数が極端に少ない (= パース失敗の疑い) なら exit 2
        run: ./calendar/bin/cal-tourism-fetch --out-dir calendar/events --min-sessions 5

      - name: Safety check (blast radius cap)
        # 1 回の crawl で変更が 30 ファイルを超えるのは異常 (誤抽出の可能性)
        # 変更対象は calendar/events/ 配下のみであることも検証
        run: |
          CHANGED=$(git status --porcelain calendar/events | wc -l | tr -d ' ')
          echo "changed in calendar/events: $CHANGED files"
          if [ "$CHANGED" -gt 30 ]; then
            echo "::error::Too many changes ($CHANGED > 30). Refusing to auto-commit." >&2
            git status --short calendar/events | head -40 >&2
            exit 3
          fi
          # crawler が想定外のディレクトリを触っていないことを確認
          OUT_OF_SCOPE=$(git status --porcelain | grep -v '^.. calendar/events/' || true)
          if [ -n "$OUT_OF_SCOPE" ]; then
            echo "::error::Crawler touched paths outside calendar/events/:" >&2
            echo "$OUT_OF_SCOPE" >&2
            exit 4
          fi

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain calendar/events)" ]; then
            CHANGED=$(git status --porcelain calendar/events | wc -l | tr -d ' ')
            CHANGED_LIST=$(git status --porcelain calendar/events | head -10 | sed 's/^...//')
            {
              echo "changed=$CHANGED"
              echo "changed_list<<EOF"
              echo "$CHANGED_LIST"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            git status --short calendar/events
            git add calendar/events
            git commit -m "calendar: tourism crawl $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "did_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "no event changes"
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord on commit
        if: steps.commit.outputs.did_commit == 'true' && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CALENDAR_WEBHOOK }}
          CHANGED: ${{ steps.commit.outputs.changed }}
          CHANGED_LIST: ${{ steps.commit.outputs.changed_list }}
        run: |
          SHA=$(git rev-parse HEAD)
          URL="https://github.com/${GITHUB_REPOSITORY}/commit/$SHA"
          BODY=$(jq -n \
            --arg c "📅 **Myはんのう カレンダー更新** (tourism crawl)

${CHANGED} 件のイベント YAML が変化しました。

\`\`\`
$(echo "$CHANGED_LIST" | head -10)
\`\`\`

$URL" \
            '{content: $c}')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$BODY" "$DISCORD_WEBHOOK" || echo "Discord notification failed (non-fatal)"

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CALENDAR_WEBHOOK }}
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY=$(jq -n \
            --arg c "⚠️ **hanno-tourism crawl 失敗** (要確認)

ソース構造変化や Safety check 発火の可能性があります。

$URL" \
            '{content: $c}')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$BODY" "$DISCORD_WEBHOOK" || true
