name: Calendar daily

on:
  schedule:
    - cron: '0 18 * * *'   # 03:00 JST (= 18:00 UTC previous day)
                           # 早朝に走らせて、利用者が朝起きる頃には apply 完了している
  workflow_dispatch:
    inputs:
      max_changes:
        description: 'events 変更の許容上限 (catch-up 時のみ引き上げ。空=既定50)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'calendar/events/**'
      - 'calendar/bin/**'                    # crawler / apply / translate のロジック変更も即反映
      - '.github/workflows/cal-daily.yml'

permissions:
  contents: write

concurrency:
  group: cal-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gws (googleworkspace/cli)
        run: |
          VERSION=v0.22.5
          URL="https://github.com/googleworkspace/cli/releases/download/${VERSION}/google-workspace-cli-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p /tmp/gws-install
          curl -sSL -o /tmp/gws-install/gws.tar.gz "$URL"
          tar -xzf /tmp/gws-install/gws.tar.gz -C /tmp/gws-install
          BIN=$(find /tmp/gws-install -name gws -type f -executable | head -1)
          sudo install "$BIN" /usr/local/bin/gws

      - name: Install Python + PDF deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          # httpx は cal-oshirase-fetch / cal-translate-en の LLM 呼出 (Anthropic API)
          # に必須。無いと _llm_available() が False を返し、method=full に fallback
          # して content_hash がローカル (LLM 利用) と一致しなくなる → flood の原因
          pip install --quiet pyyaml httpx

      - name: Configure git identity
        # CI 内で commit するために必要。複数の commit step があるので一箇所に集約。
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Service Account credentials
        env:
          GWS_SA_JSON: ${{ secrets.GWS_SA_JSON }}
        run: |
          if [ -z "${GWS_SA_JSON:-}" ]; then
            echo "::error::GWS_SA_JSON secret missing"
            exit 1
          fi
          printf '%s' "$GWS_SA_JSON" > /tmp/sa.json
          chmod 600 /tmp/sa.json

      - name: Pre-sync snapshot (safety backup)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: ./calendar/bin/cal-myhanno snapshot -o calendar/snapshots

      # ===== ソース別 crawler を順番に実行 (それぞれ events/ に書き込み) =====

      # 各クローラは独立。1 つ失敗しても他は走らせる (失敗ソース名を記録し、
      # ジョブ末尾の "Report crawler failures" でまとめて赤にする)。
      - name: Crawl hanno-tourism
        run: ./calendar/bin/cal-tourism-fetch --out-dir calendar/events --min-sessions 5 || echo "hanno-tourism" >> "$RUNNER_TEMP/crawl-failures.txt"

      - name: Crawl city-hanno-shiminkaikan
        run: ./calendar/bin/cal-shiminkaikan-fetch --out-dir calendar/events --min-events 3 || echo "city-hanno-shiminkaikan" >> "$RUNNER_TEMP/crawl-failures.txt"

      - name: Crawl city-hanno-gikai
        run: ./calendar/bin/cal-gikai-fetch --out-dir calendar/events --min-events 0 || echo "city-hanno-gikai" >> "$RUNNER_TEMP/crawl-failures.txt"

      - name: Crawl city-hanno-shicho-blog
        run: ./calendar/bin/cal-shicho-blog-fetch --out-dir calendar/events --min-articles 0 || echo "city-hanno-shicho-blog" >> "$RUNNER_TEMP/crawl-failures.txt"

      - name: Crawl city-hanno-oshirase
        # ANTHROPIC_API_KEY が無いと 400 字超本文の method が 'llm-haiku-4-5' から
        # 'full' に変わって content_hash が変動し、incremental mode で重複 event が
        # 大量発生する原因になる (2026-05-26 障害)。ローカル migration と CI で
        # 同じ method を使うため必須。
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./calendar/bin/cal-oshirase-fetch --out-dir calendar/events --min-items 0 || echo "city-hanno-oshirase" >> "$RUNNER_TEMP/crawl-failures.txt"

      - name: Fetch manual Calendar additions + sync manual edits
        # 手動 event は Calendar UI が canonical。新規追加と既存編集の両方を YAML に取り込む。
        # クローラ管理 (source: あり) の YAML は触らない (クローラ + apply-all の責務領域)。
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: ./calendar/bin/cal-myhanno fetch -o calendar/events --update-manual

      # ===== Safety + commit + Calendar 反映 =====

      - name: Safety check (blast radius cap)
        env:
          MAX_CHANGES: ${{ github.event.inputs.max_changes || '50' }}
        run: |
          CHANGED=$(git status --porcelain calendar/events | wc -l | tr -d ' ')
          echo "events/ changed: $CHANGED files (cap: $MAX_CHANGES)"
          if [ "$CHANGED" -gt "$MAX_CHANGES" ]; then
            echo "::error::Too many event changes ($CHANGED > $MAX_CHANGES). Refusing to commit." >&2
            git status --short calendar/events | head -60 >&2
            exit 3
          fi
          OUT_OF_SCOPE=$(git status --porcelain | grep -v -E '^.. calendar/(events/|snapshots/|\.http-cache\.json$)' || true)
          if [ -n "$OUT_OF_SCOPE" ]; then
            echo "::error::Crawler touched paths outside calendar/events|snapshots/|.http-cache.json:" >&2
            echo "$OUT_OF_SCOPE" >&2
            exit 4
          fi

      - name: Capture event changes by source
        id: changes
        run: |
          # event YAML 変化 or http-cache 変化のどちらかで commit が必要
          if [ -n "$(git status --porcelain calendar/events calendar/.http-cache.json)" ]; then
            CHANGED_LIST=$(git status --porcelain calendar/events | sed 's/^...//')
            {
              echo "changed_list<<EOF"
              echo "$CHANGED_LIST"
              echo "EOF"
              echo "has_events_changes=true"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_events_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit events changes
        if: steps.changes.outputs.has_events_changes == 'true'
        run: |
          git add calendar/events calendar/.http-cache.json
          git commit -m "calendar: daily fetch $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Apply events to Calendar (if drift)
        id: apply
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          set +e
          ./calendar/bin/cal-myhanno diff -d calendar/events
          ec=$?
          set -e
          if [ "$ec" -eq 2 ]; then
            echo "drift detected, applying managed events only..."
            # 手動 event (source: なし) はスキップ。
            # → Calendar UI の手動編集が CI で上書きされない
            ./calendar/bin/cal-myhanno apply-all -d calendar/events --only-managed
            # post-apply diff は informational のみ (extras=untracked event 等の
            # apply で解消できない drift が残ることがあるため exit code を伝播させない)
            ./calendar/bin/cal-myhanno diff -d calendar/events || true
            echo "applied=true" >> "$GITHUB_OUTPUT"
          elif [ "$ec" -eq 0 ]; then
            echo "in sync, no apply needed"
            echo "applied=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::diff unexpected exit code $ec"
            exit "$ec"
          fi

      # ===== EN 翻訳 + EN apply (JP 反映後に走らせて、追従反映する) =====

      - name: Translate to English (only stale / new YAMLs)
        # translation_hash 一致なら skip するので、変更が無いときは LLM 呼出 0。
        # ANTHROPIC_API_KEY が無い環境では skip 扱い (errors を出すが exit 0)。
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY not set, skipping translation"
            exit 0
          fi
          ./calendar/bin/cal-translate-en --events-dir calendar/events

      - name: Commit translation changes
        run: |
          if [ -n "$(git status --porcelain calendar/events)" ]; then
            git add calendar/events
            git commit -m "calendar: EN translations $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no translation changes"
          fi

      - name: Apply EN events to Calendar (if drift)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          set +e
          ./calendar/bin/cal-myhanno diff -d calendar/events --lang en
          ec=$?
          set -e
          if [ "$ec" -eq 2 ]; then
            echo "EN drift detected, applying..."
            # JP apply と違い --only-managed は付けない: EN 翻訳は LLM が
            # YAML に書き戻すもので、人が Calendar UI で手編集する想定が無い
            # → 手動 event (source: 無し) も翻訳更新を Calendar に流す。
            ./calendar/bin/cal-myhanno apply-all -d calendar/events --lang en
            # post-apply diff は informational のみ (extras=untracked event 等の
            # apply で解消できない drift が残ることがあるため exit code を伝播させない)
            ./calendar/bin/cal-myhanno diff -d calendar/events --lang en || true
          elif [ "$ec" -eq 0 ]; then
            echo "EN in sync, no apply needed"
          else
            echo "::error::EN diff unexpected exit code $ec"
            exit "$ec"
          fi

      - name: Post-sync snapshot (mirror Calendar)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: ./calendar/bin/cal-myhanno snapshot -o calendar/snapshots

      - name: Commit snapshots changes
        run: |
          if [ -n "$(git status --porcelain calendar/snapshots)" ]; then
            CHANGED=$(git status --porcelain calendar/snapshots | wc -l | tr -d ' ')
            # cap = 500 (~150 events × 4 calendar = 約 600 ファイルが理論上限、
            # ほぼ全件 updated 反映でも許容。EN cal 2 個追加で従来 200 から増量).
            if [ "$CHANGED" -gt 500 ]; then
              echo "::error::Too many snapshot changes ($CHANGED > 500)." >&2
              exit 5
            fi
            git add calendar/snapshots
            git commit -m "calendar: snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no snapshot changes"
          fi

      # ===== Discord 通知 (1 日 1 回まとめ) =====

      - name: Notify Discord (consolidated)
        if: steps.changes.outputs.has_events_changes == 'true' && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CALENDAR_WEBHOOK }}
          CHANGED_LIST: ${{ steps.changes.outputs.changed_list }}
        run: |
          MSG=$(python3 - <<'PYEOF'
          import os, yaml
          from collections import OrderedDict

          # source 識別: ファイル名の UID 部分の prefix で分類
          # 表示順 (時系列の流れに沿う)
          SOURCES = OrderedDict([
              ("tourism-",      ("🌳", "飯能ツーリズム")),
              ("shiminkaikan-", ("🎭", "飯能市民会館")),
              ("gikai-",        ("🏛", "飯能市議会")),
              ("shicho-blog-",  ("📝", "市長ブログ")),
              ("oshirase-",     ("ℹ️", "飯能市政お知らせ")),
          ])
          MANUAL_KEY = ("✏️", "手動")

          groups = OrderedDict()
          for emoji, name in list(SOURCES.values()) + [MANUAL_KEY]:
              groups[name] = (emoji, [])

          for path in os.environ.get("CHANGED_LIST", "").split("\n"):
              path = path.strip()
              if not path or not os.path.exists(path):
                  continue
              with open(path) as f:
                  d = yaml.safe_load(f) or {}
              ds = str(d.get("dtstart", ""))
              date = ds[:10] if "T" in ds else ds
              summary = d.get("summary", "(no title)")

              uid_local = path.split("/")[-1].rsplit("_", 1)[-1].replace(".yaml", "")
              matched = False
              for prefix, (em, name) in SOURCES.items():
                  if uid_local.startswith(prefix):
                      groups[name][1].append((date, summary))
                      matched = True
                      break
              if not matched:
                  groups[MANUAL_KEY[1]][1].append((date, summary))

          out = ["📅 **Myはんのうカレンダー 日次更新**", ""]
          for name, (emoji, items) in groups.items():
              if not items:
                  continue
              items.sort()
              out.append(f"{emoji} **{name}** ({len(items)} 件)")
              for date, summary in items:
                  out.append(f"  🗓 {date}  {summary}")
              out.append("")
          print("\n".join(out).rstrip())
          PYEOF
          )
          jq -n --arg c "$MSG" '{content: $c}' \
            | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK" \
            || echo "Discord notification failed (non-fatal)"

      # クローラの失敗をここで集約してジョブを赤にする。成功ソースの
      # commit / Calendar 反映は既に済んでいるので、それらは失われない。
      - name: Report crawler failures
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/crawl-failures.txt" ]; then
            FAILED=$(paste -sd', ' "$RUNNER_TEMP/crawl-failures.txt")
            echo "::error::失敗したクローラ: $FAILED (他ソースは反映済み)"
            exit 1
          fi
          echo "全クローラ正常"

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CALENDAR_WEBHOOK }}
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          FAILED=""
          if [ -f "$RUNNER_TEMP/crawl-failures.txt" ]; then
            FAILED=$(paste -sd', ' "$RUNNER_TEMP/crawl-failures.txt")
          fi
          CONTENT=$(jq -nr --arg u "$URL" --arg f "$FAILED" \
            'if $f == "" then "⚠️ **Calendar daily 失敗** (要確認)\n\n\($u)"
             else "⚠️ **Calendar daily 失敗** (要確認)\n失敗クローラ: \($f) (他ソースは反映済み)\n\n\($u)" end')
          jq -n --arg c "$CONTENT" '{content: $c}' \
            | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK" \
            || true
