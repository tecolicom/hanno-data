# 方面 (general direction) ごとに線をまとめるマッピング。
#
# 「経路が同じで最終到達地点が違うだけの路線」は 1 方面にまとめる。
# 例えば 飯20 (→美杉台ニュータウン) / 飯21 (→ユーエイキャスター前)
# / 飯22 (→クラウンパッケージ前) は飯能駅から美杉台を通る経路を
# 共有するため、すべて「美杉台方面」にまとめる。
#
# line 名は data.routes の r.line を参照。未登録の line は line 自体が
# 方面として扱われる (1 line = 1 方面)。
#
# 経路が途中で分かれる線 (例: 1 line で 2 方向に分岐) は別途検討。

groups:
  - name: 美杉台方面
    lines:
      - 飯20
      - 飯21
      - 飯22
      - 美杉台線

  - name: 青梅方面
    lines:
      - 飯41-1
      - 飯42
      - 青梅線

  - name: メッツァ・宮沢方面
    lines:
      - m01
      - 飯能駅・宮沢路線

  - name: 飯能日高方面
    lines:
      - 飯26
      - 西武飯能日高線

  - name: 高麗方面
    lines:
      - 高麗線
      - 高麗川線

  - name: 中沢方面
    lines:
      - 中沢線

  - name: 双柳方面
    lines:
      - 双柳循環

  - name: 名栗・湯の沢方面
    lines:
      - 名栗線

  - name: 南高麗方面
    lines:
      - 南高麗線
