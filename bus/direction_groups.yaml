# 方面 (general direction) ごとに線をまとめるマッピング。
#
# 「経路が同じで最終到達地点が違うだけの路線」は 1 方面にまとめる。
# 出典: 飯能駅 国際興業バスのりば分類 (NaviTime 5931bus)
#   https://transfer.navitime.biz/5931bus/pc/diagram/BusCourseSearch?busstopId=00021942
# 西武バス (飯能駅南口) は別途要確認 (NaviTime 未掲載のため初期は推測)。
#
# line 名は data.routes の r.line を参照。未登録の line は line 自体が
# 方面として扱われる (1 line = 1 方面)。

groups:
  # ===== 飯能駅 (北口側 = 国際興業バスのりば、NaviTime 出典) =====

  # のりば 1
  - name: メッツァ・宮沢方面
    lines:
      - m01
      - 飯能駅・宮沢路線

  # のりば 2
  - name: 埼玉医大・西武飯能日高方面
    lines:
      - 高麗線
      - 高麗川線
      - 西武飯能日高線

  # のりば 3
  - name: 南高麗・名栗・双柳方面
    lines:
      - 南高麗線
      - 名栗線
      - 中沢線
      - 双柳循環

  # ===== 飯能駅南口 (西武バス、出典なし・推測) =====
  # 経路が分かれば NaviTime / 西武バス公式で確認推奨

  - name: 美杉台方面
    lines:
      - 飯20
      - 飯21
      - 飯22
      - 美杉台線

  - name: 青梅方面
    lines:
      - 飯41-1
      - 飯42
      - 青梅線

  # 飯26 は短距離 (飯能駅北口 ↔ 東飯能駅東口)、独立扱い (1 line = 1 方面)
