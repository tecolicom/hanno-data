# 各 source (NaviTime POI / Google MyMap KML 等) の自動取得座標が
# 実態と乖離している停留所の座標オーバーライド + stop_name 表記揺れの統一。
#
# `google_maps` フィールドが座標の出典 (Google Maps の「共有」ボタンから
# コピーした短縮 URL = maps.app.goo.gl/...)。
# `lat` / `lng` は tools/bus-timetable-extractor/resolve-coords.py で
# google_maps の redirect 先 URL から自動取得 → 上書きされる。
#
# `aliases` は別表記の stop_name を canonical 名 (= ヘッダー名) に
# 統一するためのリスト。NaviTime route_all_stops と 5931bus 等で
# 同じバス停を異なる name で持つことがあるため。
#
# `canonical` は複数のエントリーをさらに上位 station にまとめる場合に指定する。
# 例: 飯能駅 北口 / 飯能駅 南口 はそれぞれ 200m 離れた物理停留所だが、
# UI 上は「飯能駅」として集約したい場合、両方に canonical: 飯能駅 を付ける。
# extract.py がこれを読み、station:飯能駅 (location_type=1) を 1 つ作り、
# 両エントリーとその aliases 全てを parent_station=station:飯能駅 に紐付ける。
# 省略時は自己 (= ヘッダー名) を station 名として扱う。
#
# 新規追加 / 修正後の手順:
#   1. google_maps に short URL を貼る (lat/lng は空でも可)
#   2. `cd tools/bus-timetable-extractor && python3 resolve-coords.py`
#   3. 自動で lat/lng が書き込まれる
#   4. 変更を commit

overrides:
  飯能駅 北口:
    google_maps: https://maps.app.goo.gl/y2t41jPaFwt2SR6C7
    lat: 35.850882
    lng: 139.320392
    canonical: 飯能駅
    aliases:
    - 飯能駅
    - 飯能駅北口
  飯能駅 南口:
    google_maps: https://maps.app.goo.gl/xW5ZhT8grDHy2rEA7
    lat: 35.850802
    lng: 139.318337
    canonical: 飯能駅
    aliases:
    - 飯能駅南口
  東飯能駅:
