    lat: 35.852416
    lng: 139.325483
    canonical: 東飯能駅
    aliases:
    # 〔駅前広場〕 は loadBusData の正規化で （駅前広場） になるため別途列挙不要
    - 東飯能駅 (駅前広場)
    - 東飯能駅（駅前広場）
  東飯能駅東口:
