    lat: 35.852578
    lng: 139.326669
    canonical: 東飯能駅
  # む-ま号 精明・加治 ルートマップ (mu-maroot2.pdf) で「路線バス停留所」(黄色
  # マーカー) として記載されている停留所のうち、5931bus 側の停留所名が異なる
  # ものを統一する。市の認識では同じ物理停留所。
  # 「総合福祉センター南」(緑、む-ま号専用) は別 stop なので alias しない。
  飯能市役所:
