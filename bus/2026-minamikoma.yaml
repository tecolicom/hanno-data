# 南高麗線 (旧 名栗線/間野黒指方面の代替小規模運行)
# 出典: 飯能市公式 PDF (R6.2024.10.1 改正)
# https://www.city.hanno.lg.jp/material/files/group/17/minamikomakaisei.pdf
#
# NaviTime 非掲載のため、PDF から手動転記。
# ダイヤ改正時は PDF を再度確認して更新が必要。
#
# 系統:
#   南高麗01 月-金 小学校便
#   南高麗02 月・水・金のみ 行政センター便
#   南高麗02-2 月・水・金のみ 行政センター便
#   南高麗03 月・水・金のみ 苅生便
#   学02 要確認 (スクールバス、小学校予定により運休あり)
#   学03 要確認 (スクールバス、小学校予定により運休あり)
#
# 平日のみ運行 (土日祝休み)

meta:
  source: 飯能市公式 (南高麗地区バス時刻表)
  source_url: https://www.city.hanno.lg.jp/material/files/group/17/minamikomakaisei.pdf
  source_note: 'R6(2024).10.1 改正、平日限定運行'
  operator: 飯能市 (運行委託)
  extracted_at: '2026-05-04'

